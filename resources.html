<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자료실 | 대한민국행정사사무소</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #12161c;
      --muted: #5a6270;
      --line: rgba(20, 24, 32, 0.12);
      --paper: #f8f6f2;
      --maroon: #5a3540;
      --maroon-dark: #3f242e;
      --ok: #0d7a3f;
      --err: #b02135;
      --max: 1020px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(250, 249, 246, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0.78rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem 1rem;
      flex-wrap: wrap;
    }

    .brand {
      font-family: "Noto Serif KR", serif;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .brand span {
      display: block;
      font-size: 0.66rem;
      color: var(--muted);
      font-weight: 500;
      margin-top: 0.18rem;
    }

    .top-links {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    .top-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--maroon-dark);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid rgba(90, 53, 64, 0.28);
      border-radius: 2px;
      background: #fff;
      padding: 0.35rem 0.62rem;
    }

    .top-links a:hover {
      background: #f7f1eb;
      text-decoration: none;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.15rem 1rem 2.2rem;
    }

    .head {
      margin-bottom: 1rem;
    }

    .section-label {
      margin: 0 0 0.35rem;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--maroon);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif KR", serif;
      font-size: clamp(1.15rem, 2.8vw, 1.55rem);
    }

    .helper {
      margin: 0.45rem 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .status {
      min-height: 1.2rem;
      font-size: 0.82rem;
      margin-top: 0.5rem;
    }

    .ok { color: var(--ok); }
    .err { color: var(--err); }

    .panel {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      padding: 0.9rem;
      margin-bottom: 0.85rem;
    }

    .panel h2 {
      margin: 0 0 0.75rem;
      font-size: 0.98rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      margin: 0.7rem 0 0.3rem;
      color: var(--muted);
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 0.58rem 0.63rem;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 0.48rem 0.85rem;
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, var(--maroon) 0%, var(--maroon-dark) 100%);
    }

    .btn-ghost {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    #auth-login-row .btn.btn-primary {
      box-shadow: 0 2px 10px rgba(62, 36, 46, 0.38);
      outline: 2px solid rgba(90, 53, 64, 0.35);
      outline-offset: 1px;
    }
    #auth-login-row .btn.btn-ghost {
      opacity: 0.78;
      border-style: dashed;
    }
    #auth-login-row .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .auth-mode-indicator {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.55rem;
      padding: 0.28rem 0.55rem;
      border-radius: 3px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
    }
    .auth-mode-indicator[data-mode="view"] {
      color: var(--muted);
      border-style: dashed;
    }
    .auth-mode-indicator[data-mode="login"] {
      color: var(--maroon-dark);
      border-color: rgba(90, 53, 64, 0.35);
      background: rgba(90, 53, 64, 0.06);
    }
    .auth-mode-indicator[data-mode="admin"] {
      color: var(--ok);
      border-color: rgba(13, 122, 63, 0.35);
      background: rgba(13, 122, 63, 0.08);
    }

    .list {
      display: grid;
      gap: 0.7rem;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: linear-gradient(180deg, #ffffff 0%, #fdfcfa 100%);
      padding: 0.8rem 0.9rem;
      box-shadow: 0 1px 0 rgba(20, 24, 32, 0.04);
    }

    .item h3 {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.35;
    }

    .meta {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.79rem;
    }

    .body {
      margin: 0.55rem 0 0;
      white-space: pre-wrap;
      font-size: 0.88rem;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--muted);
      padding: 0.85rem;
      font-size: 0.86rem;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand">
        대한민국행정사사무소
        <span>Republic of Korea Administrative Scrivener Office</span>
      </a>
      <div class="top-links">
        <a href="index.html">메인으로</a>
        <a href="notice.html">공지사항</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <header class="head">
      <p class="section-label">Resource Center</p>
      <h1>자료실</h1>
      <p class="helper">등록된 자료를 확인할 수 있습니다. 관리자 인증 후 등록/수정/삭제가 가능합니다.</p>
    </header>

    <section class="panel" aria-label="관리자 인증">
      <h2>관리자 인증</h2>
      <p class="helper" style="margin-bottom:0.45rem;">관리자 계정으로 로그인한 경우에만 자료를 등록·수정·삭제할 수 있습니다.</p>
      <p id="auth-mode-indicator" class="auth-mode-indicator" data-mode="view" role="status" aria-live="polite">현재: 일반 보기</p>
      <div class="row" id="auth-login-row">
        <input id="admin-pass" type="password" autocomplete="current-password" placeholder="관리자 비밀번호" />
        <button id="btn-login" class="btn btn-ghost" type="button">관리자 모드 켜기</button>
        <button id="btn-logout" class="btn btn-primary" type="button">관리자 모드 끄기</button>
        <button id="btn-test-conn" class="btn btn-ghost" type="button">연결 테스트</button>
      </div>
      <p id="auth-status" class="status" role="status" aria-live="polite"></p>
    </section>

    <section id="resource-editor" class="panel" aria-label="자료 등록 및 수정" style="display:none;">
      <h2>자료 등록 / 수정 (관리자 전용)</h2>
      <form id="resource-form" novalidate>
        <input type="hidden" id="resource-id" value="" />

        <label for="resource-title">제목</label>
        <input id="resource-title" type="text" maxlength="120" required placeholder="예) 비영리법인 설립 준비 체크리스트" />

        <label for="resource-url">자료 링크(URL, 선택)</label>
        <input id="resource-url" type="text" placeholder="https://..." />

        <label for="resource-content">내용</label>
        <textarea id="resource-content" required placeholder="자료 설명 또는 본문을 입력해 주세요."></textarea>

        <label for="resource-file">파일 첨부(선택)</label>
        <input id="resource-file" type="file" />
        <p id="resource-file-current" class="meta"></p>
        <label class="row">
          <input id="resource-file-remove" type="checkbox" />
          <span>기존 첨부파일 삭제</span>
        </label>

        <div class="row" style="margin-top:0.8rem;">
          <button type="submit" class="btn btn-primary">저장</button>
          <button id="btn-reset" type="button" class="btn btn-ghost">입력 초기화</button>
        </div>
        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel" aria-label="자료 목록">
      <h2>등록된 자료</h2>
      <div id="resource-list" class="list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      var STORAGE_BUCKET = "resource-files";
      var LOCAL_RESOURCE_KEY = "websiteCorpResources";

      var adminPassInput = document.getElementById("admin-pass");
      var loginRow = document.getElementById("auth-login-row");
      var btnLogin = document.getElementById("btn-login");
      var btnLogout = document.getElementById("btn-logout");
      var btnTestConn = document.getElementById("btn-test-conn");
      var authStatus = document.getElementById("auth-status");

      var editor = document.getElementById("resource-editor");
      var form = document.getElementById("resource-form");
      var formStatus = document.getElementById("form-status");
      var list = document.getElementById("resource-list");
      var fileInput = document.getElementById("resource-file");
      var fileCurrent = document.getElementById("resource-file-current");
      var fileRemove = document.getElementById("resource-file-remove");
      var client = null;
      var currentSession = null;
      var ADMIN_EMAIL = "lkc@daum.net";
      var localAdmin = false;
      var showLoginForm = false;

      function isAdmin() {
        return !!(localAdmin || (currentSession && currentSession.user));
      }

      function loadLocalResources() {
        try {
          var raw = localStorage.getItem(LOCAL_RESOURCE_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveLocalResources(items) {
        localStorage.setItem(LOCAL_RESOURCE_KEY, JSON.stringify(items));
      }

      function setStatus(el, type, msg) {
        el.classList.remove("ok", "err");
        if (type) el.classList.add(type);
        el.textContent = msg || "";
      }

      function escapeHtml(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function asSafeUrl(text) {
        var val = String(text || "").trim();
        if (!val) return "";
        if (/^https?:\/\//i.test(val)) return val;
        return "";
      }

      function resetForm() {
        form.reset();
        document.getElementById("resource-id").value = "";
        fileCurrent.textContent = "첨부된 파일 없음";
        fileRemove.checked = false;
      }

      function formatBytes(n) {
        var size = Number(n || 0);
        if (!size) return "";
        if (size < 1024) return size + "B";
        if (size < 1024 * 1024) return Math.round(size / 1024) + "KB";
        return (size / (1024 * 1024)).toFixed(1) + "MB";
      }

      function readFileAsDataUrl(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            resolve(String(reader.result || ""));
          };
          reader.onerror = function () {
            reject(new Error("file-read-failed"));
          };
          reader.readAsDataURL(file);
        });
      }

      async function renderList() {
        var items = [];
        if (client && currentSession) {
          var res = await client
            .from("resources")
            .select("id, title, url, content, file_name, file_path, file_size, created_at")
            .order("created_at", { ascending: false });
          if (!res.error) {
            items = res.data || [];
          } else {
            items = loadLocalResources();
          }
        } else {
          items = loadLocalResources();
        }
        var adminOn = isAdmin();
        if (items.length === 0) {
          list.innerHTML = '<p class="empty">등록된 자료가 없습니다.</p>';
          return;
        }

        list.innerHTML = items.map(function (item) {
          var safeTitle = escapeHtml(item.title);
          var safeBody = escapeHtml(item.content);
          var safeDate = escapeHtml(String(item.created_at || "").slice(0, 10));
          var safeUrl = asSafeUrl(item.url);
          var link = safeUrl
            ? '<p class="meta"><a href="' + safeUrl + '" target="_blank" rel="noopener noreferrer">자료 링크 열기</a></p>'
            : "";
          var fileLink = "";
          if (item.file_data && item.file_name) {
            var safeFileNameLocal = escapeHtml(item.file_name || "첨부파일");
            var safeSizeLocal = escapeHtml(formatBytes(item.file_size));
            fileLink = '<p class="meta"><a href="' + item.file_data + '" download="' + safeFileNameLocal + '">첨부파일 다운로드: ' + safeFileNameLocal + '</a>' + (safeSizeLocal ? " (" + safeSizeLocal + ")" : "") + "</p>";
          } else if (item.file_path && item.file_name && client) {
            var safeFileName = escapeHtml(item.file_name || "첨부파일");
            var safeSize = escapeHtml(formatBytes(item.file_size));
            var pub = client.storage.from(STORAGE_BUCKET).getPublicUrl(item.file_path);
            var publicUrl = pub && pub.data ? pub.data.publicUrl : "";
            if (publicUrl) {
              fileLink = '<p class="meta"><a href="' + publicUrl + '" download="' + safeFileName + '">첨부파일 다운로드: ' + safeFileName + '</a>' + (safeSize ? " (" + safeSize + ")" : "") + "</p>";
            }
          }
          var adminBtns = adminOn
            ? '<div class="row" style="margin-top:0.55rem;">' +
              '<button type="button" class="btn btn-ghost" data-act="edit" data-id="' + item.id + '">수정</button>' +
              '<button type="button" class="btn btn-ghost" data-act="del" data-id="' + item.id + '">삭제</button>' +
              "</div>"
            : "";

          return (
            '<article class="item">' +
            "<h3>" + safeTitle + "</h3>" +
            '<p class="meta">등록일: ' + safeDate + "</p>" +
            link +
            fileLink +
            '<p class="body">' + safeBody + "</p>" +
            adminBtns +
            "</article>"
          );
        }).join("");
      }

      var authModeIndicator = document.getElementById("auth-mode-indicator");

      function applyAuthButtonStyles() {
        var on = isAdmin();
        btnLogin.classList.remove("btn-primary", "btn-ghost");
        btnLogout.classList.remove("btn-primary", "btn-ghost");
        btnTestConn.classList.remove("btn-primary", "btn-ghost");
        btnTestConn.classList.add("btn-ghost");
        btnLogin.setAttribute("aria-pressed", "false");
        btnLogout.setAttribute("aria-pressed", "false");
        if (on) {
          btnLogin.classList.add("btn-ghost");
          btnLogout.classList.add("btn-primary");
          btnLogout.setAttribute("aria-pressed", "true");
        } else if (showLoginForm) {
          btnLogin.classList.add("btn-primary");
          btnLogout.classList.add("btn-ghost");
          btnLogin.setAttribute("aria-pressed", "true");
        } else {
          btnLogin.classList.add("btn-ghost");
          btnLogout.classList.add("btn-primary");
          btnLogout.setAttribute("aria-pressed", "true");
        }
        if (authModeIndicator) {
          if (on) {
            authModeIndicator.setAttribute("data-mode", "admin");
            authModeIndicator.textContent = "현재: 관리자 모드 (로그인됨)";
          } else if (showLoginForm) {
            authModeIndicator.setAttribute("data-mode", "login");
            authModeIndicator.textContent = "현재: 로그인 입력 중 — 비밀번호 입력 후 「관리자 모드 켜기」";
          } else {
            authModeIndicator.setAttribute("data-mode", "view");
            authModeIndicator.textContent = "현재: 일반 보기 — 「관리자 모드 켜기」로 로그인 화면 열기";
          }
        }
      }

      function updateAdminUi() {
        var on = isAdmin();
        editor.style.display = on ? "block" : "none";
        adminPassInput.disabled = on;
        btnLogin.disabled = on;
        btnLogout.disabled = false;
        btnLogin.textContent = "관리자 모드 켜기";
        btnLogout.textContent = "관리자 모드 끄기";
        loginRow.style.display = "flex";
        if (!on && showLoginForm) {
          adminPassInput.style.display = "";
          btnTestConn.style.display = "";
        } else if (on) {
          adminPassInput.style.display = "none";
          btnTestConn.style.display = "";
        } else {
          adminPassInput.style.display = "none";
          btnTestConn.style.display = "none";
        }
        applyAuthButtonStyles();

        if (localAdmin) {
          setStatus(authStatus, "ok", "로컬 비상 관리자 모드가 켜졌습니다.");
        } else if (on) {
          setStatus(authStatus, "ok", "관리자 모드가 켜졌습니다.");
        } else if (!showLoginForm) {
          setStatus(authStatus, "", "관리자 모드가 꺼져 있습니다.");
          setStatus(formStatus, "", "");
          resetForm();
        }
      }

      if (!window.supabase || !window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        setStatus(authStatus, "err", "Supabase 미설정 시 로컬 비상 모드만 사용 가능합니다. 비상 암호는 SUPABASE_SETUP 안내를 참고하세요.");
      } else {
        client = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        var sessionRes = await client.auth.getSession();
        currentSession = sessionRes.data.session;
      }
      updateAdminUi();
      await renderList();

      btnLogin.addEventListener("click", async function () {
        if (!isAdmin() && !showLoginForm) {
          showLoginForm = true;
          adminPassInput.value = "";
          updateAdminUi();
          setStatus(authStatus, "", "비밀번호를 입력한 뒤 `관리자 모드 켜기`를 눌러 로그인하세요.");
          return;
        }
        var email = ADMIN_EMAIL;
        var val = (adminPassInput.value || "").trim();
        if (!val) {
          setStatus(authStatus, "err", "비밀번호를 입력해 주세요.");
          return;
        }
        if (val === "admin1234") {
          localAdmin = true;
          currentSession = null;
          adminPassInput.value = "";
          updateAdminUi();
          await renderList();
          return;
        }
        if (!client) {
          setStatus(authStatus, "err", "Supabase가 연결되지 않았습니다. 비상 모드 암호는 설정 안내(SUPABASE_SETUP)를 참고하세요.");
          return;
        }
        var loginRes;
        try {
          loginRes = await client.auth.signInWithPassword({ email: email, password: val });
        } catch (err) {
          setStatus(
            authStatus,
            "err",
            "로그인 연결 실패(Failed to fetch). 네트워크·URL 확인 또는 비상 모드(설정 안내 참고)로 시도하세요."
          );
          return;
        }
        if (loginRes.error) {
          var m = String(loginRes.error.message || "");
          if (/Failed to fetch/i.test(m)) {
            setStatus(
              authStatus,
              "err",
              "로그인 연결 실패(Failed to fetch). 배포 URL(https) 접속·supabase-config 확인 후 재시도하세요."
            );
            return;
          }
          if (/Invalid login credentials/i.test(m)) {
            setStatus(
              authStatus,
              "err",
              "로그인 실패: 계정 또는 비밀번호가 다릅니다. Supabase에서 확인하거나 비상 모드(설정 안내)를 이용하세요."
            );
            return;
          }
          setStatus(authStatus, "err", "로그인 실패: " + m);
          return;
        }
        currentSession = loginRes.data.session;
        localAdmin = false;
        updateAdminUi();
        adminPassInput.value = "";
        await renderList();
      });

      btnLogout.addEventListener("click", async function () {
        if (!isAdmin()) {
          showLoginForm = false;
          adminPassInput.value = "";
          updateAdminUi();
          setStatus(authStatus, "", "관리자 모드가 꺼져 있습니다.");
          return;
        }
        if (client && currentSession) {
          await client.auth.signOut();
        }
        currentSession = null;
        localAdmin = false;
        showLoginForm = false;
        updateAdminUi();
        await renderList();
      });

      btnTestConn.addEventListener("click", async function () {
        if (!client) {
          setStatus(authStatus, "err", "Supabase 미연결입니다. 비상 모드는 설정 안내에 따라 사용할 수 있습니다.");
          return;
        }
        setStatus(authStatus, "", "연결 테스트 중...");
        try {
          var ping = await client.from("resources").select("id", { count: "exact", head: true });
          if (ping.error) {
            setStatus(authStatus, "err", "연결 실패: " + ping.error.message);
            return;
          }
          setStatus(authStatus, "ok", "연결 성공: Supabase와 통신 가능합니다.");
        } catch (err) {
          setStatus(authStatus, "err", "연결 실패(Failed to fetch). 네트워크/키/도메인 설정을 확인해 주세요.");
        }
      });

      document.getElementById("btn-reset").addEventListener("click", function () {
        resetForm();
        setStatus(formStatus, "", "");
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        if (!isAdmin()) {
          setStatus(formStatus, "err", "관리자만 저장할 수 있습니다.");
          return;
        }

        var id = document.getElementById("resource-id").value;
        var title = (document.getElementById("resource-title").value || "").trim();
        var url = (document.getElementById("resource-url").value || "").trim();
        var content = (document.getElementById("resource-content").value || "").trim();
        var pickedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

        if (!title || !content) {
          setStatus(formStatus, "err", "제목과 내용을 입력해 주세요.");
          return;
        }
        if (url && !/^https?:\/\//i.test(url)) {
          setStatus(formStatus, "err", "자료 링크는 http:// 또는 https:// 로 시작해야 합니다.");
          return;
        }
        if (pickedFile && pickedFile.size > 5 * 1024 * 1024) {
          setStatus(formStatus, "err", "첨부파일은 5MB 이하만 업로드할 수 있습니다.");
          return;
        }

        var attachment = null;
        if (pickedFile) {
          if (currentSession && client) {
            var path = currentSession.user.id + "/" + Date.now() + "-" + pickedFile.name;
            var up = await client.storage.from(STORAGE_BUCKET).upload(path, pickedFile, { upsert: true });
            if (up.error) {
              setStatus(formStatus, "err", "첨부파일 업로드 실패: " + up.error.message);
              return;
            }
            attachment = {
              file_name: pickedFile.name,
              file_path: path,
              file_size: pickedFile.size || 0
            };
          } else {
            var dataUrl = "";
            try {
              dataUrl = await readFileAsDataUrl(pickedFile);
            } catch (e) {
              setStatus(formStatus, "err", "첨부파일 처리에 실패했습니다.");
              return;
            }
            attachment = {
              file_name: pickedFile.name,
              file_size: pickedFile.size || 0,
              file_data: dataUrl
            };
          }
        }

        var res;
        if (currentSession && client && id) {
          var one = await client.from("resources").select("file_path").eq("id", id).maybeSingle();
          var payload = { title: title, url: url, content: content };
          if (attachment) {
            payload.file_name = attachment.file_name;
            payload.file_path = attachment.file_path;
            payload.file_size = attachment.file_size;
            if (one.data && one.data.file_path) {
              await client.storage.from(STORAGE_BUCKET).remove([one.data.file_path]);
            }
          } else if (fileRemove.checked) {
            payload.file_name = null;
            payload.file_path = null;
            payload.file_size = null;
            if (one.data && one.data.file_path) {
              await client.storage.from(STORAGE_BUCKET).remove([one.data.file_path]);
            }
          }
          res = await client.from("resources").update(payload).eq("id", id);
          setStatus(formStatus, "ok", "자료를 수정했습니다.");
        } else if (currentSession && client) {
          res = await client.from("resources").insert({
            title: title,
            url: url,
            content: content,
            file_name: attachment ? attachment.file_name : null,
            file_path: attachment ? attachment.file_path : null,
            file_size: attachment ? attachment.file_size : null
          });
          setStatus(formStatus, "ok", "자료를 등록했습니다.");
        } else {
          var localItems = loadLocalResources();
          if (id) {
            localItems = localItems.map(function (item) {
              if (String(item.id) !== String(id)) return item;
              item.title = title;
              item.url = url;
              item.content = content;
              if (attachment) {
                item.file_name = attachment.file_name || null;
                item.file_size = attachment.file_size || null;
                item.file_data = attachment.file_data || null;
                item.file_path = null;
              } else if (fileRemove.checked) {
                item.file_name = null;
                item.file_size = null;
                item.file_data = null;
                item.file_path = null;
              }
              return item;
            });
            saveLocalResources(localItems);
            setStatus(formStatus, "ok", "자료를 수정했습니다.");
            res = { error: null };
          } else {
            localItems.push({
              id: String(Date.now()),
              title: title,
              url: url,
              content: content,
              file_name: attachment ? (attachment.file_name || null) : null,
              file_size: attachment ? (attachment.file_size || null) : null,
              file_data: attachment ? (attachment.file_data || null) : null,
              file_path: null,
              created_at: new Date().toISOString()
            });
            saveLocalResources(localItems);
            setStatus(formStatus, "ok", "자료를 등록했습니다.");
            res = { error: null };
          }
        }
        if (res.error) {
          setStatus(formStatus, "err", "저장 실패: " + res.error.message);
          return;
        }

        resetForm();
        await renderList();
      });

      list.addEventListener("click", async function (e) {
        var t = e.target;
        if (!t || !t.dataset || !isAdmin()) return;

        var act = t.dataset.act;
        var id = t.dataset.id;
        if (!act || !id) return;

        if (act === "edit") {
          if (currentSession && client) {
            var one = await client
              .from("resources")
              .select("id, title, url, content, file_name, file_size")
              .eq("id", id)
              .maybeSingle();
            if (one.error || !one.data) return;
            document.getElementById("resource-id").value = one.data.id;
            document.getElementById("resource-title").value = one.data.title;
            document.getElementById("resource-url").value = one.data.url || "";
            document.getElementById("resource-content").value = one.data.content;
            if (one.data.file_name) {
              fileCurrent.textContent = "현재 첨부: " + one.data.file_name + (one.data.file_size ? " (" + formatBytes(one.data.file_size) + ")" : "");
            } else {
              fileCurrent.textContent = "첨부된 파일 없음";
            }
          } else {
            var oneLocal = loadLocalResources().find(function (x) { return String(x.id) === String(id); });
            if (!oneLocal) return;
            document.getElementById("resource-id").value = oneLocal.id;
            document.getElementById("resource-title").value = oneLocal.title || "";
            document.getElementById("resource-url").value = oneLocal.url || "";
            document.getElementById("resource-content").value = oneLocal.content || "";
            if (oneLocal.file_name) {
              fileCurrent.textContent = "현재 첨부: " + oneLocal.file_name + (oneLocal.file_size ? " (" + formatBytes(oneLocal.file_size) + ")" : "");
            } else {
              fileCurrent.textContent = "첨부된 파일 없음";
            }
          }
          fileInput.value = "";
          fileRemove.checked = false;
          setStatus(formStatus, "", "수정 모드입니다. 변경 후 저장해 주세요.");
          return;
        }

        if (act === "del") {
          if (!confirm("이 자료를 삭제하시겠습니까?")) return;
          if (currentSession && client) {
            var oneDel = await client.from("resources").select("file_path").eq("id", id).maybeSingle();
            if (oneDel.data && oneDel.data.file_path) {
              await client.storage.from(STORAGE_BUCKET).remove([oneDel.data.file_path]);
            }
            var del = await client.from("resources").delete().eq("id", id);
            if (del.error) {
              setStatus(formStatus, "err", "삭제 실패: " + del.error.message);
              return;
            }
          } else {
            var nextLocal = loadLocalResources().filter(function (x) { return String(x.id) !== String(id); });
            saveLocalResources(nextLocal);
          }
          setStatus(formStatus, "ok", "자료를 삭제했습니다.");
          await renderList();
        }
      });

      resetForm();
      updateAdminUi();
    })();
  </script>
</body>
</html>
