name: Vercel Production Deploy Guard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-prod-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy hook secret
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::Missing secret VERCEL_DEPLOY_HOOK_URL"
            echo "::error::Set it in GitHub -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Read expected CSS version from repository
        id: expected
        run: |
          EXPECTED="$(tr -d '\r' < platform-faq.html | sed -n 's/.*law-search-prd.css?v=\([0-9a-z]\+\).*/\1/p' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED" ]; then
            echo "::error::Cannot parse expected CSS version from platform-faq.html"
            exit 1
          fi
          echo "value=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "Expected CSS version: $EXPECTED"

      - name: Deploy and verify live sync (auto-retry)
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          EXPECTED: ${{ steps.expected.outputs.value }}
        run: |
          set -u
          HOOK_URL="$(printf '%s' "$DEPLOY_HOOK" | tr -d '\r\n ')"
          EXPECTED_NORM="$(printf '%s' "$EXPECTED" | tr -d '\r\n ')"

          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL is empty after trimming."
            exit 1
          fi

          LIVE_URL="https://www.daehanminkuk.co.kr/platform-faq.html"
          ATTEMPTS=8

          for i in $(seq 1 $ATTEMPTS); do
            echo "== Attempt $i/$ATTEMPTS =="
            code="$(curl -sS -o /tmp/hook.body -w "%{http_code}" -X POST "$HOOK_URL")"
            echo "Deploy hook HTTP status: $code"
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "::warning::Deploy hook returned non-success status. Body (first 400 bytes):"
              head -c 400 /tmp/hook.body || true
              echo
            fi
            echo "Waiting for propagation..."
            sleep 60

            BODY="$(
              curl -sS \
                -H 'Cache-Control: no-cache' \
                -H 'Pragma: no-cache' \
                "$LIVE_URL?cb=${GITHUB_RUN_ID}-${i}-$(date +%s)"
            )"
            LIVE="$(printf '%s' "$BODY" | tr -d '\r' | sed -n 's/.*law-search-prd.css?v=\([0-9a-z]\+\).*/\1/p' | head -n 1 | tr -d '\r\n ')"
            echo "Expected=$EXPECTED_NORM / Live=$LIVE"

            if [ "$LIVE" = "$EXPECTED_NORM" ]; then
              echo "Production is synced."
              exit 0
            fi

            if [ "$i" -lt "$ATTEMPTS" ]; then
              echo "Not synced yet. Retrying..."
              sleep 45
            fi
          done

          echo "::error::Production did not sync to expected CSS version ($EXPECTED_NORM) after $ATTEMPTS attempts."
          exit 1
