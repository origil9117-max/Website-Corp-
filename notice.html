<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>공지사항 | 대한민국행정사사무소</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #12161c;
      --muted: #5a6270;
      --line: rgba(20, 24, 32, 0.12);
      --paper: #f8f6f2;
      --maroon: #5a3540;
      --maroon-dark: #3f242e;
      --max: 980px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(250, 249, 246, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0.78rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem 1rem;
      flex-wrap: wrap;
    }

    .brand {
      font-family: "Noto Serif KR", serif;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .brand:hover {
      text-decoration: none;
    }

    .brand span {
      display: block;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      font-size: 0.66rem;
      color: var(--muted);
      font-weight: 500;
      margin-top: 0.18rem;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.15rem 1rem 2.2rem;
    }

    .head {
      display: block;
      margin-bottom: 1rem;
    }
    .head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem;
      flex-wrap: wrap;
      margin-bottom: 0.2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.8vw, 1.55rem);
      font-family: "Noto Serif KR", serif;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--maroon-dark);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.82rem;
      border: 1px solid rgba(90, 53, 64, 0.28);
      border-radius: 2px;
      background: #fff;
      padding: 0.35rem 0.62rem;
    }

    .links a:hover {
      text-decoration: none;
      background: #f7f1eb;
    }

    .list {
      display: grid;
      gap: 0.75rem;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: linear-gradient(180deg, #ffffff 0%, #fdfcfa 100%);
      padding: 0.85rem 0.9rem;
      box-shadow: 0 1px 0 rgba(20, 24, 32, 0.04);
    }

    .item h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.4;
    }

    .meta {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .body {
      margin: 0.6rem 0 0;
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0.35em 0;
    }
    .body::after {
      content: "";
      display: table;
      clear: both;
    }

    .pin {
      display: inline-block;
      margin-right: 0.4rem;
      font-size: 0.74rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, var(--maroon) 0%, var(--maroon-dark) 100%);
      border-radius: 999px;
      padding: 0.18rem 0.52rem;
      vertical-align: middle;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 4px;
      background: #fff;
      padding: 0.9rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .section-label {
      margin: 0 0 0.35rem;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--maroon);
      font-weight: 700;
    }
    .admin-shortcut {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--maroon-dark);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.82rem;
      border: 1px solid rgba(90, 53, 64, 0.28);
      border-radius: 2px;
      background: #fff;
      padding: 0.35rem 0.62rem;
    }
    .admin-shortcut:hover {
      text-decoration: none;
      background: #f7f1eb;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand">
        대한민국행정사사무소
        <span>Republic of Korea Administrative Scrivener Office</span>
      </a>
      <div class="links">
        <a href="index.html">메인으로</a>
        <a href="platform.html">지능형 행정 플랫폼</a>
      </div>
    </div>
  </header>

  <div class="wrap">
    <header class="head">
      <div class="head-top">
        <p class="section-label">Notice</p>
        <a class="admin-shortcut" href="admin.html">관리자 모드</a>
      </div>
      <h1>공지사항</h1>
    </header>

    <section>
      <div id="notice-list" class="list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      var LOCAL_NOTICE_KEY = "websiteCorpNotices";
      var NOTICE_IMAGE_MAX_BYTES = 5 * 1024 * 1024;
      var noticeList = document.getElementById("notice-list");
      if (!noticeList) return;

      function loadLocalNotices() {
        try {
          var raw = localStorage.getItem(LOCAL_NOTICE_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function sortNotices(items) {
        return items.slice().sort(function (a, b) {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          var ad = String(a.created_at || a.createdText || "");
          var bd = String(b.created_at || b.createdText || "");
          if (ad === bd) return 0;
          return ad > bd ? -1 : 1;
        });
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizeNoticeText(str) {
        return String(str || "")
          .replace(/\u00a0/g, " ")
          .replace(/[\u200b-\u200d\ufeff]/g, "")
          .replace(/[ \t]{2,}/g, " ");
      }

      function escapeAttr(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function normalizeImgSrc(src) {
        var s = String(src || "").trim();
        if (!s) return "";
        if (s.indexOf("//") === 0 && s.indexOf("http") !== 0) s = "https:" + s;
        return s;
      }

      function isSafeImgSrc(src) {
        var s = normalizeImgSrc(src);
        if (!s) return false;
        if (/^javascript:/i.test(s) || /^vbscript:/i.test(s)) return false;
        if (/^data:/i.test(s)) {
          if (/^data:image\/(png|jpe?g|gif|webp|bmp);base64,/i.test(s)) {
            var maxDataUrlChars = Math.ceil(NOTICE_IMAGE_MAX_BYTES * 1.45) + 2048;
            return s.length <= maxDataUrlChars;
          }
          return false;
        }
        try {
          var u = new URL(s);
          if (u.protocol !== "http:" && u.protocol !== "https:") return false;
          return true;
        } catch (e) {
          return false;
        }
      }

      function resolveImgNodeSrc(node) {
        var src = node.getAttribute("src") || "";
        if (!String(src).trim()) {
          src =
            node.getAttribute("data-src") ||
            node.getAttribute("data-lazy-src") ||
            node.getAttribute("data-original") ||
            node.getAttribute("data-rawsrc") ||
            "";
        }
        if (!String(src).trim() && node.getAttribute("srcset")) {
          var part = String(node.getAttribute("srcset")).split(",")[0].trim();
          src = part.split(/\s+/)[0] || "";
        }
        return normalizeImgSrc(src);
      }

      function sanitizeInlineStyle(styleText) {
        var src = String(styleText || "").toLowerCase();
        var out = [];
        src.split(";").forEach(function (rule) {
          var parts = rule.split(":");
          if (parts.length < 2) return;
          var prop = parts[0].trim();
          var val = parts.slice(1).join(":").trim();
          if (!prop || !val) return;
          if (prop === "font-size" && /^[0-9.]+(px|em|rem|%)$/.test(val)) out.push(prop + ":" + val);
          if (prop === "font-weight" && /^(bold|[1-9]00)$/.test(val)) out.push(prop + ":" + val);
          if (prop === "text-decoration" && /^(underline|none)$/.test(val)) out.push(prop + ":" + val);
          if (prop === "color" && /^#([0-9a-f]{3}|[0-9a-f]{6})$/.test(val)) out.push(prop + ":" + val);
          if (prop === "font-family" && /^[a-z0-9,\- "'()]+$/.test(val)) out.push(prop + ":" + val);
        });
        return out.join("; ");
      }

      function sanitizeBlockStyle(styleText) {
        var src = String(styleText || "");
        var out = [];
        src.split(";").forEach(function (rule) {
          var parts = rule.split(":");
          if (parts.length < 2) return;
          var prop = parts[0].trim().toLowerCase();
          var val = parts.slice(1).join(":").trim().toLowerCase();
          if (prop === "text-align" && /^(left|right|center|justify)$/.test(val)) {
            out.push("text-align:" + val);
          }
        });
        return out.join("; ");
      }

      function buildImgStyleForSanitize(node) {
        var st = String(node.getAttribute("style") || "");
        var mw = "100%";
        var m = st.match(/max-width\s*:\s*([^;]+)/i);
        if (m) {
          var v = String(m[1]).trim();
          if (/^([1-9][0-9]?|100)%$/.test(v)) mw = v;
          else if (/^([1-9][0-9]{2,3})px$/i.test(v)) {
            var px = parseInt(v, 10);
            if (px >= 50 && px <= 2000) mw = px + "px";
          }
        }
        var align = "center";
        if (/float\s*:\s*left/i.test(st)) align = "left";
        else if (/float\s*:\s*right/i.test(st)) align = "right";
        var base = "max-width:" + mw + ";height:auto;display:block;";
        if (align === "left") return base + "float:left;margin:0.35em 1em 0.35em 0;";
        if (align === "right") return base + "float:right;margin:0.35em 0 0.35em 1em;";
        return base + "float:none;margin:0.35em auto;";
      }

      function sanitizeNoticeHtml(rawHtml) {
        var allowed = {
          B: true, STRONG: true, I: true, EM: true, U: true, BR: true,
          P: true, DIV: true, UL: true, OL: true, LI: true, SPAN: true, IMG: true
        };
        var doc = new DOMParser().parseFromString(String(rawHtml || ""), "text/html");

        function clean(node) {
          if (node.nodeType === 3) return escapeHtml(normalizeNoticeText(node.nodeValue || ""));
          if (node.nodeType !== 1) return "";
          var tag = String(node.tagName || "").toUpperCase();
          var children = Array.prototype.slice.call(node.childNodes).map(clean).join("");
          if (tag === "IMG") {
            var src = resolveImgNodeSrc(node);
            if (!isSafeImgSrc(src)) return "";
            var alt = escapeHtml(normalizeNoticeText(node.getAttribute("alt") || ""));
            var styleOut = buildImgStyleForSanitize(node);
            return (
              '<img src="' +
              escapeAttr(src) +
              '" alt="' +
              alt +
              '" loading="lazy" decoding="async" style="' +
              escapeHtml(styleOut) +
              '" />'
            );
          }
          if (!allowed[tag]) return children;
          if (tag === "BR") return "<br>";
          var attrs = "";
          if (tag === "SPAN") {
            var safeStyle = sanitizeInlineStyle(node.getAttribute("style"));
            if (safeStyle) attrs = ' style="' + escapeHtml(safeStyle) + '"';
          } else if (tag === "P" || tag === "DIV" || tag === "LI") {
            var blockSt = sanitizeBlockStyle(node.getAttribute("style"));
            if (blockSt) attrs = ' style="' + escapeHtml(blockSt) + '"';
          }
          return "<" + tag.toLowerCase() + attrs + ">" + children + "</" + tag.toLowerCase() + ">";
        }

        return Array.prototype.slice.call(doc.body.childNodes).map(clean).join("").trim();
      }

      async function render() {
        var items = [];
        if (!window.supabase || !window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
          items = loadLocalNotices();
        } else {
          var client = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
          var res = await client
            .from("notices")
            .select("title, content, pinned, created_at")
            .order("pinned", { ascending: false })
            .order("created_at", { ascending: false });

          if (!res.error) items = res.data || [];
          else items = [];
        }
        items = sortNotices(items);
        if (items.length === 0) {
          noticeList.innerHTML = '<p class="empty">등록된 공지사항이 없습니다.</p>';
          return;
        }

        noticeList.innerHTML = items.map(function (item) {
          var title = escapeHtml(item.title || "");
          var content = sanitizeNoticeHtml(item.content || "");
          var created = escapeHtml(String(item.created_at || item.createdText || "").slice(0, 10));
          var pin = item.pinned ? '<span class="pin">고정</span>' : "";

          return (
            '<article class="item">' +
            "<h2>" + pin + title + "</h2>" +
            '<p class="meta">등록일: ' + created + "</p>" +
            '<div class="body">' + content + "</div>" +
            "</article>"
          );
        }).join("");
      }

      await render();
    })();
  </script>
</body>
</html>
