<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>공지사항 관리자 | 대한민국행정사사무소</title>
  <style>
    :root {
      --ink: #12161c;
      --muted: #5a6270;
      --line: rgba(20, 24, 32, 0.12);
      --paper: #f8f6f2;
      --maroon: #5a3540;
      --maroon-dark: #3f242e;
      --ok: #0d7a3f;
      --err: #b02135;
      --max: 1020px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.55;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.2rem 1rem 2rem;
    }

    .head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem 1rem;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.7vw, 1.5rem);
    }

    .head a {
      color: var(--maroon);
      font-weight: 700;
      text-decoration: none;
    }

    .head a:hover {
      text-decoration: underline;
    }

    .grid {
      display: grid;
      gap: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.9rem;
      align-items: start;
    }

    .grid > .panel {
      width: 100%;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1rem;
    }

    .panel h2 {
      margin: 0 0 0.8rem;
      font-size: 1rem;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
    }

    .panel-head h2 {
      margin: 0;
    }

    .btn-zoom {
      display: none;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      margin: 0.75rem 0 0.35rem;
      color: var(--muted);
    }

    input[type="text"],
    textarea,
    input[type="password"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 2px;
      padding: 0.6rem 0.65rem;
      font: inherit;
      color: var(--ink);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .notice-compose-panel {
      min-width: 320px;
    }

    .notice-compose-panel {
      position: relative;
      overflow: visible;
    }

    .notice-editor {
      width: 100%;
      min-height: 180px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 2px;
      padding: 0.6rem 0.65rem;
      font: inherit;
      color: var(--ink);
      overflow: auto;
      line-height: 1.6;
    }

    .notice-editor:focus {
      outline: 2px solid rgba(90, 53, 64, 0.35);
      outline-offset: 1px;
    }

    .notice-editor:empty::before {
      content: attr(data-placeholder);
      color: #8d95a2;
      pointer-events: none;
    }

    .notice-editor img,
    .body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0.35em 0;
      vertical-align: middle;
    }
    .notice-editor img.editor-inline-img {
      cursor: pointer;
      border-radius: 2px;
    }
    .notice-editor img.editor-inline-img.editor-inline-img--selected {
      outline: 2px solid var(--maroon);
      outline-offset: 2px;
    }
    .notice-editor.post-editor--img-align-drag {
      user-select: none;
      -webkit-user-select: none;
    }
    .notice-editor.post-editor--img-align-drag img.editor-inline-img {
      cursor: ew-resize;
    }
    .notice-image-toolbar {
      display: none;
      position: fixed;
      z-index: 10050;
      flex-wrap: nowrap;
      align-items: center;
      gap: 0.28rem 0.35rem;
      padding: 0.38rem 0.45rem;
      background: #fff;
      border: 1px solid rgba(36, 48, 64, 0.18);
      border-radius: 6px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
      box-sizing: border-box;
      max-width: min(calc(100vw - 16px), 36rem);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .notice-image-toolbar.is-visible {
      display: flex;
    }
    .notice-image-toolbar .btn-img {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fafafa;
      border-radius: 2px;
      padding: 0.24rem 0.38rem;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink);
      white-space: nowrap;
    }
    .notice-image-toolbar .btn-img:hover {
      background: #f0ecf5;
      border-color: rgba(124, 93, 147, 0.45);
    }
    .notice-image-toolbar .btn-img.danger {
      color: #8b2c2c;
      border-color: rgba(139, 44, 44, 0.35);
    }
    .notice-image-toolbar .img-toolbar-cap {
      font-size: 0.62rem;
      font-weight: 800;
      color: var(--maroon);
      margin-right: 0.06rem;
      flex-shrink: 0;
    }
    .notice-image-toolbar .btn-img--align {
      min-width: 2.35rem;
      border-color: rgba(124, 93, 147, 0.5);
      background: linear-gradient(180deg, #faf8fc 0%, #f3ebf7 100%);
    }
    .notice-image-toolbar-sep {
      flex: 0 0 auto;
      width: 1px;
      align-self: stretch;
      min-height: 1.1rem;
      margin: 0 0.1rem;
      background: rgba(36, 48, 64, 0.18);
    }
    .notice-paste-hint {
      margin: 0.4rem 0 0.35rem;
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .body::after {
      content: "";
      display: table;
      clear: both;
    }

    .selection-toolbar {
      position: static;
      z-index: 1;
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0.34rem;
      margin: 0.45rem 0 0.45rem;
      padding: 0.35rem 0.45rem;
      border: 1px solid rgba(20, 24, 32, 0.15);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 8px 24px rgba(20, 24, 32, 0.14);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .selection-align-inline {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      gap: 0.28rem;
      padding: 0.1rem 0.32rem;
      border: 1px solid rgba(124, 93, 147, 0.45);
      border-radius: 5px;
      background: linear-gradient(180deg, #faf6fc 0%, #f3ebf7 100%);
    }
    .selection-toolbar-label {
      font-size: 0.74rem;
      font-weight: 800;
      color: var(--maroon);
      white-space: nowrap;
    }
    #notice-selection-align {
      min-width: 5.75rem;
      height: 1.45rem;
      font-weight: 700;
      border-color: rgba(124, 93, 147, 0.45);
      border-radius: 3px;
      background: #fff;
    }
    .selection-toolbar-sep {
      width: 1px;
      align-self: stretch;
      min-height: 1.2rem;
      margin: 0 0.08rem;
      background: rgba(36, 48, 64, 0.15);
      flex-shrink: 0;
    }

    .selection-toolbar .btn {
      padding: 0.3rem 0.52rem;
      font-size: 0.76rem;
      line-height: 1.1;
    }

    .selection-toolbar input[type="color"] {
      width: 1.7rem;
      height: 1.35rem;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
    }

    .selection-toolbar select {
      height: 1.45rem;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: #fff;
      padding: 0 0.32rem;
      font-size: 0.76rem;
      color: #2f3440;
    }

    

    .row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.85rem;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 0.5rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(180deg, var(--maroon) 0%, var(--maroon-dark) 100%);
    }

    .btn-ghost {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    /* 관리자 켜기/끄기: 선택된 쪽만 강조 (둘 다 비슷해 보이는 문제 완화) */
    #auth-login-row .btn.btn-primary {
      box-shadow: 0 2px 10px rgba(62, 36, 46, 0.38);
      outline: 2px solid rgba(90, 53, 64, 0.35);
      outline-offset: 1px;
    }
    #auth-login-row .btn.btn-ghost {
      opacity: 0.78;
      border-style: dashed;
    }
    #auth-login-row .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .auth-mode-indicator {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.55rem;
      padding: 0.28rem 0.55rem;
      border-radius: 3px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
    }
    .auth-mode-indicator[data-mode="view"] {
      color: var(--muted);
      border-style: dashed;
    }
    .auth-mode-indicator[data-mode="login"] {
      color: var(--maroon-dark);
      border-color: rgba(90, 53, 64, 0.35);
      background: rgba(90, 53, 64, 0.06);
    }
    .auth-mode-indicator[data-mode="admin"] {
      color: var(--ok);
      border-color: rgba(13, 122, 63, 0.35);
      background: rgba(13, 122, 63, 0.08);
    }

    .status {
      min-height: 1.2rem;
      font-size: 0.82rem;
      margin-top: 0.55rem;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.err {
      color: var(--err);
    }

    .auth-box {
      margin-bottom: 0.9rem;
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 4px;
      padding: 0.85rem;
    }

    .auth-box p {
      margin: 0 0 0.45rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .notice-list {
      display: grid;
      gap: 0.65rem;
    }
    .notice-list-panel {
      min-width: 220px;
    }

    .item.is-editing {
      border-color: rgba(90, 53, 64, 0.55);
      box-shadow: 0 0 0 2px rgba(90, 53, 64, 0.14);
      background: linear-gradient(180deg, #fff 0%, #fff7fb 100%);
    }
    .btn.is-active-edit {
      background: rgba(90, 53, 64, 0.16);
      border-color: rgba(90, 53, 64, 0.56);
      color: #3f242e;
      font-weight: 800;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.75rem;
      background: #fff;
    }

    .item h3 {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .meta {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .body {
      margin: 0.55rem 0 0;
      font-size: 0.86rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .empty {
      color: var(--muted);
      font-size: 0.84rem;
      border: 1px dashed var(--line);
      background: #fff;
      padding: 0.8rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>공지사항 관리자 모드</h1>
      <a href="index.html">메인으로 돌아가기</a>
    </div>

    <div class="auth-box">
      <p>Supabase에 등록한 관리자 계정 비밀번호로 로그인하면 등록·수정·삭제가 활성화됩니다. 일반 방문자에게는 비밀번호가 보이지 않습니다.</p>
      <p id="auth-mode-indicator" class="auth-mode-indicator" data-mode="view" role="status" aria-live="polite">현재: 일반 보기</p>
      <div class="row" id="auth-login-row">
        <input id="admin-pass" type="password" autocomplete="current-password" placeholder="관리자 비밀번호" />
        <button id="btn-login" class="btn btn-ghost" type="button">관리자 모드 켜기</button>
        <button id="btn-logout" class="btn btn-primary" type="button">관리자 모드 끄기</button>
        <button id="btn-test-conn" class="btn btn-ghost" type="button">연결 테스트</button>
      </div>
      <p id="auth-status" class="status" role="status" aria-live="polite"></p>
      <hr style="margin: 0.8rem 0; border: 0; border-top: 1px solid var(--line);" />
      <p>로그인 상태에서 계정 비밀번호를 변경할 수 있습니다.</p>
      <div class="row">
        <input id="current-pass" type="password" placeholder="현재 비밀번호(확인용)" />
        <input id="next-pass" type="password" placeholder="새 비밀번호 (4자 이상)" />
        <input id="next-pass-confirm" type="password" placeholder="새 비밀번호 확인" />
        <button id="btn-change-pass" class="btn btn-ghost" type="button">비밀번호 변경</button>
      </div>
      <p id="pass-status" class="status" role="status" aria-live="polite"></p>
    </div>

    <div class="grid">
      <section class="panel notice-compose-panel">
        <div class="panel-head">
          <h2>공지 등록 / 수정</h2>
          <button id="btn-compose-zoom" class="btn-zoom" type="button" aria-pressed="false">확대</button>
        </div>
        <form id="notice-form" novalidate>
          <input type="hidden" id="notice-id" value="" />

          <label for="notice-title">제목</label>
          <input id="notice-title" type="text" maxlength="120" required placeholder="예) 5월 휴무 안내" />

          <label for="notice-content-editor">내용</label>
          <div
            id="notice-content-editor"
            class="notice-editor"
            contenteditable="true"
            tabindex="0"
            data-placeholder="공지 내용을 입력해 주세요."
            role="textbox"
            aria-multiline="true"
          ></div>
          <div
            id="notice-image-toolbar"
            class="notice-image-toolbar"
            role="toolbar"
            aria-label="선택한 그림"
            hidden
          >
            <span style="font-size:0.68rem;color:var(--muted);margin-right:0.12rem;flex-shrink:0;">그림</span>
            <span class="img-toolbar-cap">비율</span>
            <button type="button" class="btn-img" data-img-act="w25">25%</button>
            <button type="button" class="btn-img" data-img-act="w50">50%</button>
            <button type="button" class="btn-img" data-img-act="w75">75%</button>
            <button type="button" class="btn-img" data-img-act="w100">100%</button>
            <span class="notice-image-toolbar-sep" aria-hidden="true"></span>
            <span class="img-toolbar-cap">위치</span>
            <button type="button" class="btn-img btn-img--align" data-img-act="align-left" title="왼쪽">왼쪽</button>
            <button type="button" class="btn-img btn-img--align" data-img-act="align-center" title="가운데">가운데</button>
            <button type="button" class="btn-img btn-img--align" data-img-act="align-right" title="오른쪽">오른쪽</button>
            <span class="notice-image-toolbar-sep" aria-hidden="true"></span>
            <button type="button" class="btn-img danger" data-img-act="del">삭제</button>
          </div>
          <p class="notice-paste-hint" role="note">그림은 붙여넣기 또는 아래 파일 선택으로 넣을 수 있습니다. 선택 후 비율·위치를 조정하거나 가로로 끌어 배치할 수 있습니다.</p>
          <input id="notice-inline-image-input" type="file" accept="image/*" multiple style="font-size:0.82rem;max-width:100%;" />
          <div id="selection-toolbar" class="selection-toolbar" aria-label="선택 텍스트 편집 메뉴">
            <div class="selection-align-inline" aria-label="문단 정렬">
              <label class="selection-toolbar-label" for="notice-selection-align">정렬</label>
              <select id="notice-selection-align" title="문단 정렬" aria-label="문단 정렬">
                <option value="">선택…</option>
                <option value="justifyLeft">왼쪽</option>
                <option value="justifyCenter">가운데</option>
                <option value="justifyRight">오른쪽</option>
              </select>
            </div>
            <span class="selection-toolbar-sep" aria-hidden="true"></span>
            <button class="btn btn-ghost" type="button" data-editor-cmd="bold">진하게</button>
            <button class="btn btn-ghost" type="button" data-editor-cmd="underline">밑줄</button>
            <button class="btn btn-ghost" type="button" data-editor-cmd="bigger">A+</button>
            <button class="btn btn-ghost" type="button" data-editor-cmd="smaller">A-</button>
            <select id="selection-font" aria-label="폰트 선택">
              <option value="">폰트</option>
              <option value="'Noto Sans KR', sans-serif">기본</option>
              <option value="'Malgun Gothic', 'Noto Sans KR', sans-serif">맑은 고딕</option>
              <option value="'Nanum Gothic', 'Noto Sans KR', sans-serif">나눔고딕</option>
              <option value="'Nanum Myeongjo', serif">나눔명조</option>
            </select>
            <input id="selection-color" type="color" value="#b02135" title="글자 색상" aria-label="글자 색상" />
            <button class="btn btn-ghost" type="button" data-editor-cmd="clearStyle">초기화</button>
          </div>
          <textarea id="notice-content" style="display:none;"></textarea>

          <label class="row">
            <input id="notice-pinned" type="checkbox" />
            <span>상단 고정 공지</span>
          </label>

          <div class="row">
            <button class="btn btn-primary" type="submit">저장</button>
            <button id="btn-reset" class="btn btn-ghost" type="button">입력 초기화</button>
          </div>
          <p id="form-status" class="status" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel notice-list-panel">
        <h2>등록된 공지</h2>
        <div id="notice-list" class="notice-list"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      var LOCAL_NOTICE_KEY = "websiteCorpNotices";
      var noticeForm = document.getElementById("notice-form");
      var formStatus = document.getElementById("form-status");
      var noticeList = document.getElementById("notice-list");
      var grid = document.querySelector(".grid");
      var composePanel = document.querySelector(".notice-compose-panel");
      var noticeListPanel = document.querySelector(".notice-list-panel");
      var btnComposeZoom = document.getElementById("btn-compose-zoom");
      var noticeContentEditor = document.getElementById("notice-content-editor");
      var selectionToolbar = document.getElementById("selection-toolbar");
      var noticeImageToolbar = document.getElementById("notice-image-toolbar");
      var noticeInlineImageInput = document.getElementById("notice-inline-image-input");
      var selectionColor = document.getElementById("selection-color");
      var selectionFont = document.getElementById("selection-font");
      var noticeSelectionAlign = document.getElementById("notice-selection-align");
      var authStatus = document.getElementById("auth-status");
      var passInput = document.getElementById("admin-pass");
      var loginRow = document.getElementById("auth-login-row");
      var btnLogin = document.getElementById("btn-login");
      var btnLogout = document.getElementById("btn-logout");
      var btnTestConn = document.getElementById("btn-test-conn");
      var currentPassInput = document.getElementById("current-pass");
      var nextPassInput = document.getElementById("next-pass");
      var nextPassConfirmInput = document.getElementById("next-pass-confirm");
      var btnChangePass = document.getElementById("btn-change-pass");
      var passStatus = document.getElementById("pass-status");
      var client = null;
      var currentSession = null;
      var localAdmin = false;
      var ADMIN_EMAIL = "lkc@daum.net";
      var showLoginForm = false;
      var savedEditorRange = null;
      var editingNoticeId = "";
      var composeZoomed = false;
      var selectedNoticeImg = null;
      var imageAlignDragSession = null;
      var MAX_NOTICE_IMAGE_BYTES = 1024 * 1024;

      function setStatus(el, type, msg) {
        el.classList.remove("ok", "err");
        if (type) el.classList.add(type);
        el.textContent = msg || "";
      }

      function escapeHtml(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizeNoticeText(str) {
        return String(str || "")
          .replace(/\u00a0/g, " ")
          .replace(/[\u200b-\u200d\ufeff]/g, "")
          .replace(/[ \t]{2,}/g, " ");
      }

      function escapeAttr(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function normalizeImgSrc(src) {
        var s = String(src || "").trim();
        if (!s) return "";
        if (s.indexOf("//") === 0 && s.indexOf("http") !== 0) s = "https:" + s;
        return s;
      }

      function isSafeImgSrc(src) {
        var s = normalizeImgSrc(src);
        if (!s) return false;
        if (/^javascript:/i.test(s) || /^vbscript:/i.test(s)) return false;
        if (/^data:/i.test(s)) {
          if (/^data:image\/(png|jpe?g|gif|webp|bmp);base64,/i.test(s)) return s.length <= 2500000;
          return false;
        }
        try {
          var u = new URL(s);
          if (u.protocol !== "http:" && u.protocol !== "https:") return false;
          return true;
        } catch (e) {
          return false;
        }
      }

      function resolveImgNodeSrc(node) {
        var src = node.getAttribute("src") || "";
        if (!String(src).trim()) {
          src =
            node.getAttribute("data-src") ||
            node.getAttribute("data-lazy-src") ||
            node.getAttribute("data-original") ||
            node.getAttribute("data-rawsrc") ||
            "";
        }
        if (!String(src).trim() && node.getAttribute("srcset")) {
          var part = String(node.getAttribute("srcset")).split(",")[0].trim();
          src = part.split(/\s+/)[0] || "";
        }
        return normalizeImgSrc(src);
      }

      function sanitizeInlineStyle(styleText) {
        var src = String(styleText || "").toLowerCase();
        var out = [];
        src.split(";").forEach(function (rule) {
          var parts = rule.split(":");
          if (parts.length < 2) return;
          var prop = parts[0].trim();
          var val = parts.slice(1).join(":").trim();
          if (!prop || !val) return;
          if (prop === "font-size" && /^[0-9.]+(px|em|rem|%)$/.test(val)) out.push(prop + ":" + val);
          if (prop === "font-weight" && /^(bold|[1-9]00)$/.test(val)) out.push(prop + ":" + val);
          if (prop === "text-decoration" && /^(underline|none)$/.test(val)) out.push(prop + ":" + val);
          if (prop === "color" && /^#([0-9a-f]{3}|[0-9a-f]{6})$/.test(val)) out.push(prop + ":" + val);
          if (prop === "font-family" && /^[a-z0-9,\- "'()]+$/.test(val)) out.push(prop + ":" + val);
        });
        return out.join("; ");
      }

      function sanitizeBlockStyle(styleText) {
        var src = String(styleText || "");
        var out = [];
        src.split(";").forEach(function (rule) {
          var parts = rule.split(":");
          if (parts.length < 2) return;
          var prop = parts[0].trim().toLowerCase();
          var val = parts.slice(1).join(":").trim().toLowerCase();
          if (prop === "text-align" && /^(left|right|center|justify)$/.test(val)) {
            out.push("text-align:" + val);
          }
        });
        return out.join("; ");
      }

      function buildImgStyleForSanitize(node) {
        var st = String(node.getAttribute("style") || "");
        var mw = "100%";
        var m = st.match(/max-width\s*:\s*([^;]+)/i);
        if (m) {
          var v = String(m[1]).trim();
          if (/^([1-9][0-9]?|100)%$/.test(v)) mw = v;
          else if (/^([1-9][0-9]{2,3})px$/i.test(v)) {
            var px = parseInt(v, 10);
            if (px >= 50 && px <= 2000) mw = px + "px";
          }
        }
        var align = "center";
        if (/float\s*:\s*left/i.test(st)) align = "left";
        else if (/float\s*:\s*right/i.test(st)) align = "right";
        var base = "max-width:" + mw + ";height:auto;display:block;";
        if (align === "left") return base + "float:left;margin:0.35em 1em 0.35em 0;";
        if (align === "right") return base + "float:right;margin:0.35em 0 0.35em 1em;";
        return base + "float:none;margin:0.35em auto;";
      }

      function sanitizeNoticeHtml(rawHtml) {
        var allowed = {
          B: true, STRONG: true, I: true, EM: true, U: true, BR: true,
          P: true, DIV: true, UL: true, OL: true, LI: true, SPAN: true, IMG: true
        };
        var doc = new DOMParser().parseFromString(String(rawHtml || ""), "text/html");

        function clean(node) {
          if (node.nodeType === 3) return escapeHtml(normalizeNoticeText(node.nodeValue || ""));
          if (node.nodeType !== 1) return "";
          var tag = String(node.tagName || "").toUpperCase();
          var children = Array.prototype.slice.call(node.childNodes).map(clean).join("");
          if (tag === "IMG") {
            var src = resolveImgNodeSrc(node);
            if (!isSafeImgSrc(src)) return "";
            var alt = escapeHtml(normalizeNoticeText(node.getAttribute("alt") || ""));
            var styleOut = buildImgStyleForSanitize(node);
            return (
              '<img src="' +
              escapeAttr(src) +
              '" alt="' +
              alt +
              '" loading="lazy" decoding="async" style="' +
              escapeHtml(styleOut) +
              '" />'
            );
          }
          if (!allowed[tag]) return children;
          if (tag === "BR") return "<br>";
          var attrs = "";
          if (tag === "SPAN") {
            var safeStyle = sanitizeInlineStyle(node.getAttribute("style"));
            if (safeStyle) attrs = ' style="' + escapeHtml(safeStyle) + '"';
          } else if (tag === "P" || tag === "DIV" || tag === "LI") {
            var blockSt = sanitizeBlockStyle(node.getAttribute("style"));
            if (blockSt) attrs = ' style="' + escapeHtml(blockSt) + '"';
          }
          return "<" + tag.toLowerCase() + attrs + ">" + children + "</" + tag.toLowerCase() + ">";
        }

        return Array.prototype.slice.call(doc.body.childNodes).map(clean).join("").trim();
      }

      function editorPlainText() {
        return String((noticeContentEditor && noticeContentEditor.textContent) || "").trim();
      }

      function noticeEditorHasContent() {
        if (!noticeContentEditor) return false;
        var txt = String(noticeContentEditor.textContent || "")
          .replace(/\u00a0/g, " ")
          .replace(/[\u200b-\u200d\ufeff]/g, "")
          .trim();
        if (txt.length > 0) return true;
        var imgs = noticeContentEditor.querySelectorAll("img");
        for (var i = 0; i < imgs.length; i++) {
          if (String(imgs[i].getAttribute("src") || "").trim()) return true;
        }
        return false;
      }

      function getAnyRangeInNoticeEditor() {
        var sel = window.getSelection ? window.getSelection() : null;
        if (!sel || !sel.rangeCount || !noticeContentEditor) return null;
        var range = sel.getRangeAt(0);
        if (!range) return null;
        var common = range.commonAncestorContainer;
        var host = common && common.nodeType === 1 ? common : (common ? common.parentElement : null);
        if (!host || !noticeContentEditor.contains(host)) return null;
        return range;
      }

      function insertHtmlIntoNoticeEditor(htmlStr) {
        if (!noticeContentEditor || !String(htmlStr || "").trim()) return;
        noticeContentEditor.focus();
        var sel = window.getSelection();
        if (!sel.rangeCount) {
          var r = document.createRange();
          r.selectNodeContents(noticeContentEditor);
          r.collapse(false);
          sel.addRange(r);
        }
        var range = sel.getRangeAt(0);
        range.deleteContents();
        var wrapper = document.createElement("div");
        wrapper.innerHTML = htmlStr;
        var frag = document.createDocumentFragment();
        var last = null;
        while (wrapper.firstChild) {
          last = wrapper.firstChild;
          frag.appendChild(last);
        }
        range.insertNode(frag);
        if (last) {
          range.setStartAfter(last);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        }
        saveCurrentEditorRange();
        normalizeNoticeEditorImages(noticeContentEditor);
      }

      function normalizeNoticeEditorImages(root) {
        if (!root) return;
        var anchors = root.querySelectorAll("a");
        for (var ai = anchors.length - 1; ai >= 0; ai--) {
          var a = anchors[ai];
          if (!a.parentNode) continue;
          var ch = a.childNodes;
          if (ch.length === 1 && ch[0].nodeType === 1 && String(ch[0].tagName).toUpperCase() === "IMG") {
            var im = ch[0];
            a.parentNode.insertBefore(im, a);
            a.remove();
          }
        }
        Array.prototype.forEach.call(root.querySelectorAll("img"), function (img) {
          img.contentEditable = "false";
          img.setAttribute("draggable", "false");
          img.classList.add("editor-inline-img");
        });
      }

      function fileToDataURL(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            resolve(String(reader.result || ""));
          };
          reader.onerror = function () {
            reject(new Error("read-failed"));
          };
          reader.readAsDataURL(file);
        });
      }

      function isLikelyImageFile(file) {
        if (!file) return false;
        if (file.type && /^image\//i.test(file.type)) return true;
        var n = (file.name || "").toLowerCase();
        return /\.(png|jpe?g|gif|webp|bmp|avif|heic|jfif|tiff?)$/i.test(n);
      }

      async function insertNoticeInlineImageFile(file) {
        if (!file || !isLikelyImageFile(file)) return;
        if (file.size > MAX_NOTICE_IMAGE_BYTES) {
          setStatus(formStatus, "err", "이미지 용량이 1MB를 초과합니다. (" + (file.name || "이미지") + ")");
          return;
        }
        try {
          var dataUrl = await fileToDataURL(file);
          if (!isSafeImgSrc(dataUrl)) return;
          var html =
            '<img src="' +
            escapeAttr(dataUrl) +
            '" alt="" style="max-width:100%;height:auto;display:block;float:none;margin:0.35em auto;" />';
          insertHtmlIntoNoticeEditor(html);
          setStatus(formStatus, "", "");
        } catch (err) {
          setStatus(formStatus, "err", "이미지 읽기에 실패했습니다.");
        }
      }

      async function convertBlobImagesInNoticeEditorToDataUrls() {
        if (!noticeContentEditor) return;
        var imgs = noticeContentEditor.querySelectorAll('img[src^="blob:"]');
        for (var i = 0; i < imgs.length; i++) {
          var img = imgs[i];
          var blobUrl = img.getAttribute("src") || "";
          if (blobUrl.indexOf("blob:") !== 0) continue;
          try {
            var res = await fetch(blobUrl);
            if (!res.ok) continue;
            var blob = await res.blob();
            var file = new File([blob], "paste.png", {
              type: blob.type && /^image\//i.test(blob.type) ? blob.type : "image/png"
            });
            if (file.size > MAX_NOTICE_IMAGE_BYTES) {
              throw new Error("이미지가 1MB를 초과합니다.");
            }
            var dataUrl = await fileToDataURL(file);
            if (!isSafeImgSrc(dataUrl)) continue;
            img.setAttribute("src", dataUrl);
          } catch (err) {
            if (err && err.message && /1MB|초과/.test(err.message)) throw err;
          }
        }
      }

      function positionNoticeImageToolbar() {
        if (!noticeImageToolbar || !selectedNoticeImg) return;
        noticeImageToolbar.removeAttribute("hidden");
        noticeImageToolbar.classList.add("is-visible");
        var rect = selectedNoticeImg.getBoundingClientRect();
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            var tw = noticeImageToolbar.offsetWidth || 200;
            var th = noticeImageToolbar.offsetHeight || 40;
            var margin = 8;
            var ed = noticeContentEditor ? noticeContentEditor.getBoundingClientRect() : null;
            var fmt = selectionToolbar ? selectionToolbar.getBoundingClientRect() : null;
            var fmtTop = fmt ? fmt.top : vh;
            var minY = ed ? ed.top + margin : margin;
            var topBelow = rect.bottom + margin;
            var topAbove = rect.top - th - margin;
            var top;
            var maxTopForBelow = fmtTop - th - margin;
            if (topBelow <= maxTopForBelow && topBelow + th <= vh - margin) {
              top = Math.max(minY, topBelow);
            } else if (topAbove >= minY && topAbove + th <= fmtTop - margin) {
              top = topAbove;
            } else if (topAbove >= minY) {
              top = topAbove;
            } else {
              top = Math.max(minY, Math.min(topBelow, maxTopForBelow));
            }
            if (top + th > fmtTop - margin) top = Math.max(minY, fmtTop - th - margin);
            if (top < minY) top = minY;
            if (top + th > vh - margin) top = Math.max(minY, vh - th - margin);

            var left = rect.left + rect.width / 2 - tw / 2;
            if (ed) {
              left = Math.max(ed.left + margin, Math.min(left, ed.right - tw - margin));
            }
            left = Math.max(margin, Math.min(left, vw - tw - margin));

            noticeImageToolbar.style.top = top + "px";
            noticeImageToolbar.style.left = left + "px";
          });
        });
      }

      function clearNoticeImageSelection() {
        if (selectedNoticeImg) {
          selectedNoticeImg.classList.remove("editor-inline-img--selected");
          selectedNoticeImg = null;
        }
        if (noticeImageToolbar) {
          noticeImageToolbar.setAttribute("hidden", "");
          noticeImageToolbar.classList.remove("is-visible");
        }
      }

      function selectNoticeEditorImage(img) {
        if (!img || !noticeContentEditor.contains(img)) return;
        if (selectedNoticeImg && selectedNoticeImg !== img) {
          selectedNoticeImg.classList.remove("editor-inline-img--selected");
        }
        selectedNoticeImg = img;
        img.classList.add("editor-inline-img--selected");
        noticeContentEditor.focus();
        var sel = window.getSelection();
        if (sel) {
          var r = document.createRange();
          r.selectNode(img);
          sel.removeAllRanges();
          sel.addRange(r);
        }
        positionNoticeImageToolbar();
      }

      function removeSelectedNoticeEditorImage() {
        if (!selectedNoticeImg || !noticeContentEditor.contains(selectedNoticeImg)) return;
        selectedNoticeImg.remove();
        clearNoticeImageSelection();
        saveCurrentEditorRange();
      }

      function applySelectedNoticeImageWidth(pct) {
        if (!selectedNoticeImg || !noticeContentEditor.contains(selectedNoticeImg)) return;
        selectedNoticeImg.style.maxWidth = pct + "%";
        selectedNoticeImg.style.width = "";
        positionNoticeImageToolbar();
        saveCurrentEditorRange();
      }

      function applySelectedNoticeImageAlign(align) {
        if (!selectedNoticeImg || !noticeContentEditor.contains(selectedNoticeImg)) return;
        var img = selectedNoticeImg;
        var mw = img.style.maxWidth || "";
        if (!mw) {
          var attr = img.getAttribute("style") || "";
          var mm = attr.match(/max-width\s*:\s*([^;]+)/i);
          if (mm) mw = mm[1].trim();
        }
        if (align === "left") {
          img.style.float = "left";
          img.style.display = "block";
          img.style.margin = "0.35em 1em 0.35em 0";
        } else if (align === "right") {
          img.style.float = "right";
          img.style.display = "block";
          img.style.margin = "0.35em 0 0.35em 1em";
        } else {
          img.style.float = "none";
          img.style.display = "block";
          img.style.margin = "0.35em auto";
        }
        if (mw) img.style.maxWidth = mw;
        img.style.width = "";
        positionNoticeImageToolbar();
        saveCurrentEditorRange();
      }

      function detachNoticeImageAlignDragListeners() {
        document.removeEventListener("mousemove", onNoticeImageAlignDragMove, true);
        document.removeEventListener("mouseup", onNoticeImageAlignDragEnd, true);
      }

      function noticeImageAlignDragCoords(ev) {
        return { x: ev.clientX, y: ev.clientY };
      }

      function onNoticeImageAlignDragMove(e) {
        var s = imageAlignDragSession;
        if (!s) return;
        var p = noticeImageAlignDragCoords(e);
        var dx = p.x - s.x0;
        var dy = p.y - s.y0;
        if (!s.dragCursor && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          if (Math.abs(dx) >= Math.abs(dy) && noticeContentEditor) {
            noticeContentEditor.classList.add("post-editor--img-align-drag");
            s.dragCursor = true;
          }
        }
        if (s.dragCursor && e.cancelable) e.preventDefault();
      }

      function onNoticeImageAlignDragEnd(e) {
        var s = imageAlignDragSession;
        if (!s) return;
        var p = noticeImageAlignDragCoords(e);
        var dx = p.x - s.x0;
        var dy = p.y - s.y0;
        detachNoticeImageAlignDragListeners();
        if (noticeContentEditor) noticeContentEditor.classList.remove("post-editor--img-align-drag");
        imageAlignDragSession = null;

        if (!noticeContentEditor || !noticeContentEditor.contains(s.img)) return;
        var upTarget = e.target;
        if (upTarget && noticeImageToolbar && noticeImageToolbar.contains(upTarget)) return;
        if (!upTarget || !noticeContentEditor.contains(upTarget)) return;
        if (Math.abs(dx) < 16) return;
        if (Math.abs(dy) > Math.abs(dx) * 1.05) return;

        selectNoticeEditorImage(s.img);
        var ed = noticeContentEditor.getBoundingClientRect();
        var w = ed.width;
        if (w < 8) return;
        var rel = (p.x - ed.left) / w;
        if (rel < 0) rel = 0;
        if (rel > 1) rel = 1;
        var align = rel < 0.34 ? "left" : rel < 0.67 ? "center" : "right";
        applySelectedNoticeImageAlign(align);
      }

      function beginNoticeImageAlignDragTracking(ev, img) {
        detachNoticeImageAlignDragListeners();
        if (!img) return;
        var p = noticeImageAlignDragCoords(ev);
        imageAlignDragSession = { img: img, x0: p.x, y0: p.y, dragCursor: false };
        document.addEventListener("mousemove", onNoticeImageAlignDragMove, true);
        document.addEventListener("mouseup", onNoticeImageAlignDragEnd, true);
      }

      /** 붙여넣기 등으로 <a><img></a>처럼 감싸진 경우 e.target이 IMG가 아닐 수 있음 */
      function findDelegatedEditorImg(target, root) {
        if (!target || !root) return null;
        var el = target.nodeType === 1 ? target : target.parentElement;
        if (!el) return null;
        var img = el.tagName === "IMG" ? el : el.closest ? el.closest("img") : null;
        if (!img || !root.contains(img)) return null;
        return img;
      }

      function bindNoticeImageTools() {
        if (!noticeContentEditor || !noticeImageToolbar) return;

        function onNoticeEditorImgActivate(e) {
          if (e.pointerType === "mouse" && e.button !== 0) return;
          var img = findDelegatedEditorImg(e.target, noticeContentEditor);
          if (!img) return;
          e.preventDefault();
          if (e.stopPropagation) e.stopPropagation();
          selectNoticeEditorImage(img);
          beginNoticeImageAlignDragTracking(e, img);
        }

        if (window.PointerEvent) {
          noticeContentEditor.addEventListener("pointerdown", onNoticeEditorImgActivate, {
            capture: true,
            passive: false
          });
        } else {
          noticeContentEditor.addEventListener("mousedown", onNoticeEditorImgActivate, true);
        }

        noticeContentEditor.addEventListener("click", function (e) {
          if (findDelegatedEditorImg(e.target, noticeContentEditor)) return;
          clearNoticeImageSelection();
        });

        noticeImageToolbar.addEventListener("mousedown", function (e) {
          if (e.target.closest && e.target.closest("[data-img-act]")) {
            e.preventDefault();
          }
        });

        noticeImageToolbar.addEventListener("click", function (e) {
          var btn = e.target && e.target.closest ? e.target.closest("[data-img-act]") : null;
          if (!btn) return;
          e.preventDefault();
          var act = btn.getAttribute("data-img-act");
          if (act === "del") {
            removeSelectedNoticeEditorImage();
            return;
          }
          if (act === "w25") applySelectedNoticeImageWidth(25);
          else if (act === "w50") applySelectedNoticeImageWidth(50);
          else if (act === "w75") applySelectedNoticeImageWidth(75);
          else if (act === "w100") applySelectedNoticeImageWidth(100);
          else if (act === "align-left") applySelectedNoticeImageAlign("left");
          else if (act === "align-center") applySelectedNoticeImageAlign("center");
          else if (act === "align-right") applySelectedNoticeImageAlign("right");
        });

        noticeContentEditor.addEventListener(
          "keydown",
          function (e) {
            if (!selectedNoticeImg || !noticeContentEditor.contains(selectedNoticeImg)) return;
            if (e.key === "Delete" || e.key === "Backspace") {
              e.preventDefault();
              e.stopPropagation();
              removeSelectedNoticeEditorImage();
            }
          },
          true
        );

        window.addEventListener("scroll", function () {
          if (selectedNoticeImg && noticeImageToolbar && noticeImageToolbar.classList.contains("is-visible")) {
            positionNoticeImageToolbar();
          }
        }, true);
        window.addEventListener("resize", function () {
          if (selectedNoticeImg && noticeImageToolbar && noticeImageToolbar.classList.contains("is-visible")) {
            positionNoticeImageToolbar();
          }
        });
      }

      function collectClipboardImageFiles(clip) {
        var files = [];
        var seen = Object.create(null);
        function add(f) {
          if (!f || typeof f.size !== "number") return;
          if (!isLikelyImageFile(f)) return;
          var key = f.size + "|" + (f.type || "") + "|" + (f.name || "");
          if (seen[key]) return;
          seen[key] = true;
          files.push(f);
        }
        var items = clip.items;
        if (items && items.length) {
          for (var i = 0; i < items.length; i++) {
            var it = items[i];
            try {
              if (typeof it.getAsFile !== "function") continue;
              if (it.kind === "file") {
                add(it.getAsFile());
              } else if (/^image\//i.test(String(it.type || ""))) {
                add(it.getAsFile());
              }
            } catch (ex) {}
          }
        }
        if (clip.files && clip.files.length) {
          for (var j = 0; j < clip.files.length; j++) {
            add(clip.files[j]);
          }
        }
        return files;
      }

      function currentRangeInEditor() {
        var sel = window.getSelection ? window.getSelection() : null;
        if (!sel || !sel.rangeCount) return null;
        var range = sel.getRangeAt(0);
        if (!range || range.collapsed) return null;
        var common = range.commonAncestorContainer;
        var host = common && common.nodeType === 1 ? common : (common ? common.parentElement : null);
        if (!host || !noticeContentEditor || !noticeContentEditor.contains(host)) return null;
        return range;
      }

      function saveCurrentEditorRange() {
        var range = getAnyRangeInNoticeEditor();
        savedEditorRange = range ? range.cloneRange() : null;
      }

      function restoreSavedEditorRange() {
        if (!savedEditorRange) return false;
        var sel = window.getSelection ? window.getSelection() : null;
        if (!sel) return false;
        sel.removeAllRanges();
        sel.addRange(savedEditorRange);
        return true;
      }

      function wrapSelectionWithStyle(styleText) {
        var range = currentRangeInEditor();
        if (!range) return;
        var selectedText = String(range.toString() || "").trim();
        if (!selectedText) return;
        var span = document.createElement("span");
        span.setAttribute("style", styleText);
        try {
          var fragment = range.extractContents();
          span.appendChild(fragment);
          range.insertNode(span);
          var sel = window.getSelection();
          sel.removeAllRanges();
          var next = document.createRange();
          next.selectNodeContents(span);
          sel.addRange(next);
        } catch (err) {
          document.execCommand("styleWithCSS", false, true);
          if (/font-size/.test(styleText)) {
            document.execCommand("fontSize", false, /1\.2/.test(styleText) ? "5" : "2");
          }
          if (/color/.test(styleText)) {
            var color = styleText.split(":")[1];
            document.execCommand("foreColor", false, color);
          }
        }
      }

      function runEditorCommand(cmd) {
        if (!noticeContentEditor) return;
        if (!currentRangeInEditor()) restoreSavedEditorRange();
        if (!currentRangeInEditor()) return;
        noticeContentEditor.focus();
        if (cmd === "underline") {
          document.execCommand("underline", false, null);
          return;
        }
        if (cmd === "bold") {
          document.execCommand("bold", false, null);
          return;
        }
        if (cmd === "bigger") {
          wrapSelectionWithStyle("font-size:1.2em");
          return;
        }
        if (cmd === "smaller") {
          wrapSelectionWithStyle("font-size:0.86em");
          return;
        }
        if (cmd === "clearStyle") {
          document.execCommand("removeFormat", false, null);
          document.execCommand("unlink", false, null);
          return;
        }
        document.execCommand(cmd, false, null);
      }

      function hideSelectionToolbar() {
        if (selectionToolbar) selectionToolbar.classList.remove("is-open");
      }

      function showSelectionToolbar() {
        if (selectionToolbar) selectionToolbar.classList.add("is-open");
      }

      noticeForm.addEventListener("click", function (e) {

          var clip = e.clipboardData;
          if (!clip) return;
          var files = collectClipboardImageFiles(clip);
          if (files.length) {
            e.preventDefault();
            void (async function () {
              for (var i = 0; i < files.length; i++) {
                await insertNoticeInlineImageFile(files[i]);
              }
            })();
            return;
          }
          var hasText =
            String(clip.getData("text/plain") || "")
              .replace(/\uFEFF/g, "")
              .trim() ||
            String(clip.getData("text/html") || "").trim();
          if (hasText) return;
          if (navigator.clipboard && navigator.clipboard.read) {
            e.preventDefault();
            void navigator.clipboard
              .read()
              .then(function (items) {
                var p = null;
                for (var i = 0; i < items.length; i++) {
                  var types = items[i].types || [];
                  for (var j = 0; j < types.length; j++) {
                    if (/^image\//i.test(types[j])) {
                      p = items[i].getType(types[j]);
                      break;
                    }
                  }
                  if (p) break;
                }
                if (!p) return Promise.reject(new Error("no-clipboard-image"));
                return p;
              })
              .then(function (blob) {
                if (!blob || blob.size < 20) return Promise.reject(new Error("empty-blob"));
                var ct = blob.type && /^image\//i.test(blob.type) ? blob.type : "image/png";
                var file = new File([blob], "clipboard.png", { type: ct });
                return insertNoticeInlineImageFile(file);

                );
              });
            return;

      function loadLocalNotices() {
        try {
          var raw = localStorage.getItem(LOCAL_NOTICE_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveLocalNotices(items) {
        localStorage.setItem(LOCAL_NOTICE_KEY, JSON.stringify(items));
      }

      function sortNoticeItems(items) {
        return items.slice().sort(function (a, b) {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          var ad = String(a.created_at || a.createdText || "");
          var bd = String(b.created_at || b.createdText || "");
          if (ad === bd) return 0;
          return ad > bd ? -1 : 1;
        });
      }

      function isRlsDenied(err) {
        var msg = err && err.message ? String(err.message) : "";
        return /row-level security policy/i.test(msg);
      }

      async function migrateLocalNoticesToCloud() {
        if (!client) return;
        var localItems = loadLocalNotices();
        if (!localItems.length) return;
        try {
          var cloud = await client
            .from("notices")
            .select("title, content, pinned, created_at");
          if (cloud.error) return;
          var existing = Array.isArray(cloud.data) ? cloud.data : [];
          var toInsert = [];
          for (var i = 0; i < localItems.length; i++) {
            var n = localItems[i];
            var createdAt = n.created_at || n.createdText || new Date().toISOString();
            var dup = existing.some(function (c) {
              return String(c.title || "") === String(n.title || "") &&
                     String(c.content || "") === String(n.content || "") &&
                     !!c.pinned === !!n.pinned;
            });
            if (!dup) {
              toInsert.push({
                title: n.title || "",
                content: n.content || "",
                pinned: !!n.pinned,
                created_at: createdAt
              });
            }
          }
          if (toInsert.length) {
            var ins = await client.from("notices").insert(toInsert);
            if (ins.error) return;
          }
          localStorage.removeItem(LOCAL_NOTICE_KEY);
          setStatus(authStatus, "ok", "로컬 공지를 공용(Supabase)으로 동기화했습니다.");
        } catch (e) {
          return;
        }
      }

      function isAdmin() {

      async function renderList() {
        var items = [];
        if (client) {
          var res = await client
            .from("notices")
            .select("id, title, content, pinned, created_at")
            .order("pinned", { ascending: false })
            .order("created_at", { ascending: false });
          if (!res.error) {
            items = res.data || [];
          } else {
            items = loadLocalNotices();
          }
        } else {
          items = loadLocalNotices();
        }
        items = sortNoticeItems(items);
        if (items.length === 0) {
          noticeList.innerHTML = '<p class="empty">등록된 공지가 없습니다.</p>';
          return;
        }

        var adminOn = isAdmin();
        noticeList.innerHTML = items.map(function (item) {
          var pinTag = item.pinned ? " · 상단고정" : "";
          var created = String(item.created_at || item.createdText || "").slice(0, 16).replace("T", " ");
          var editingCls = String(editingNoticeId) === String(item.id) ? " is-editing" : "";
          var editBtnCls = String(editingNoticeId) === String(item.id) ? " is-active-edit" : "";
          var editBtnText = String(editingNoticeId) === String(item.id) ? "수정중" : "수정";
          var editPressed = String(editingNoticeId) === String(item.id) ? "true" : "false";
          var control = adminOn
            ? '<div class="row">' +
              '<button class="btn btn-ghost' + editBtnCls + '" type="button" data-act="edit" data-id="' + item.id + '" aria-pressed="' + editPressed + '">' + editBtnText + "</button>" +
              '<button class="btn btn-ghost" type="button" data-act="del" data-id="' + item.id + '">삭제</button>' +
              "</div>"
            : "";

          return (
            '<article class="item' + editingCls + '">' +
            "<h3>" + escapeHtml(item.title) + "</h3>" +
            '<p class="meta">등록: ' + escapeHtml(created) + pinTag + "</p>" +
            '<div class="body">' + sanitizeNoticeHtml(item.content) + "</div>" +
            control +
            "</article>"
          );
        }).join("");
      }

        var current = (currentPassInput.value || "").trim();

        var confirm = (nextPassConfirmInput.value || "").trim();
        if (!currentSession || !currentSession.user) {
          setStatus(passStatus, "err", "비상모드에서는 비밀번호 변경을 지원하지 않습니다. Supabase 로그인 후 변경해 주세요.");
          return;
        }
        var userEmail = currentSession.user.email;
        if (!current || !next || !confirm) {
          setStatus(passStatus, "err", "현재/새 비밀번호를 모두 입력해 주세요.");
          return;

          return;

        var check = await client.auth.signInWithPassword({ email: userEmail, password: current });
        if (check.error) {
          setStatus(passStatus, "err", "현재 비밀번호가 올바르지 않습니다.");
          return;

        var updateRes = await client.auth.updateUser({ password: next });

          if (res.error) {
            if (isRlsDenied(res.error)) {
              setStatus(
                formStatus,
                "err",
                "저장 실패: notices RLS 정책이 쓰기를 막고 있습니다. Supabase SQL Editor에서 저장소의 notices.sql을 1회 실행해 주세요."
              );
            } else {
              setStatus(formStatus, "err", "저장 실패: " + res.error.message);
            }
            return;
          }
        } else {
          var itemsLocal = loadLocalNotices();
          if (id) {
            itemsLocal = itemsLocal.map(function (n) {
              if (String(n.id) !== String(id)) return n;
              n.title = title;

              n.pinned = pinned;
              return n;
            });

            itemsLocal.push({
              id: String(Date.now()),
              title: title,
              content: contentHtml,
              pinned: pinned,
              createdText: new Date().toISOString().slice(0, 16).replace("T", " ")
            });
          }
          saveLocalNotices(itemsLocal);
        }
        setStatus(formStatus, "ok", id ? "공지를 수정했습니다." : "공지를 등록했습니다.");
        resetForm();
        await renderList();

      noticeList.addEventListener("click", async function (e) {

        if (!target || !target.dataset || !isAdmin()) return;
        var act = target.dataset.act;
        var id = target.dataset.id;
        if (!act || !id) return;

        if (act === "edit") {
          editingNoticeId = String(id);
          document.body.classList.add("notice-editing");
          if (composePanel) composePanel.style.width = "";
          await renderList();
          if (client) {
            var one = await client.from("notices").select("id, title, content, pinned").eq("id", id).maybeSingle();
            if (one.error || !one.data) return;
            document.getElementById("notice-id").value = one.data.id;
            document.getElementById("notice-title").value = one.data.title;
            if (noticeContentEditor) {
              noticeContentEditor.innerHTML = sanitizeNoticeHtml(one.data.content || "");
              normalizeNoticeEditorImages(noticeContentEditor);
            }
            document.getElementById("notice-pinned").checked = !!one.data.pinned;
          } else {
            var oneLocal = loadLocalNotices().find(function (x) { return String(x.id) === String(id); });
            if (!oneLocal) return;
            document.getElementById("notice-id").value = oneLocal.id;
            document.getElementById("notice-title").value = oneLocal.title || "";
            if (noticeContentEditor) {
              noticeContentEditor.innerHTML = sanitizeNoticeHtml(oneLocal.content || "");
              normalizeNoticeEditorImages(noticeContentEditor);
            }
            document.getElementById("notice-pinned").checked = !!oneLocal.pinned;
          }
          setStatus(formStatus, "", "수정 모드입니다. 내용을 변경 후 저장해 주세요.");
          if (noticeContentEditor) {
            noticeContentEditor.focus();
            noticeContentEditor.scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
          return;
        }

        if (act === "del") {
          if (!confirm("이 공지를 삭제하시겠습니까?")) return;
          if (String(editingNoticeId) === String(id)) editingNoticeId = "";
          if (client) {
            var del = await client.from("notices").delete().eq("id", id);
            if (del.error) {
              if (isRlsDenied(del.error)) {
                setStatus(
                  formStatus,
                  "err",
                  "삭제 실패: notices RLS 정책이 쓰기를 막고 있습니다. Supabase SQL Editor에서 저장소의 notices.sql을 1회 실행해 주세요."
                );
              } else {
                setStatus(formStatus, "err", "삭제 실패: " + del.error.message);
              }
              return;
            }
          } else {
            var nextLocal = loadLocalNotices().filter(function (x) { return String(x.id) !== String(id); });
            saveLocalNotices(nextLocal);
          }
          setStatus(formStatus, "ok", "공지를 삭제했습니다.");
          await renderList();
        }
      });
    })();
  </script>
</body>
</html>
