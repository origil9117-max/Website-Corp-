name: Vercel Production Deploy Guard

# Production 동기화 확인: VERCEL_DEPLOY_HOOK_URL은 www.daehanminkuk.co.kr을 서빙하는
# 동일 Vercel 프로젝트의 Production 훅이어야 합니다(다른 프로젝트면 main과 live가 불일치).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-prod-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy hook secret
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::Missing secret VERCEL_DEPLOY_HOOK_URL"
            echo "::error::Set it in GitHub -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Read expected markers from repository
        id: expected
        run: |
          EXPECTED_CSS="$(tr -d '\r' < platform-faq.html | sed -n 's/.*law-search-prd.css?v=\([0-9a-z]\+\).*/\1/p' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_CSS" ]; then
            echo "::error::Cannot parse expected CSS version from platform-faq.html"
            exit 1
          fi
          EXPECTED_EMB_MARKER="$(tr -d '\r' < platform-faq.html | grep -o 'applyEmbassyDeepLinkFromUrl' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_EMB_MARKER" ]; then
            echo "::error::Cannot find embassy deep-link marker in platform-faq.html"
            exit 1
          fi
          EXPECTED_MAIN_BTN_MARKER="$(tr -d '\r' < integrated-search.html | grep -o 'class="main-home-btn"' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_MAIN_BTN_MARKER" ]; then
            echo "::error::Cannot find main-home-btn marker in integrated-search.html"
            exit 1
          fi
          EXPECTED_MAIN_BTN_FIXED_MARKER="$(tr -d '\r' < integrated-search.html | grep -o 'position: fixed;' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_MAIN_BTN_FIXED_MARKER" ]; then
            echo "::error::Cannot find main button fixed marker in integrated-search.html"
            exit 1
          fi
          EXPECTED_INTEGRATED_PLACEHOLDER_MARKER="$(tr -d '\r' < integrated-search.html | grep -o '표준코드, 관할출입국, 재외공관 등' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_INTEGRATED_PLACEHOLDER_MARKER" ]; then
            echo "::error::Cannot find integrated-search placeholder marker in integrated-search.html"
            exit 1
          fi
          EXPECTED_INDEX_SEARCH_BG_MARKER="$(tr -d '\r' < index.html | grep -o '#2a3253' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_INDEX_SEARCH_BG_MARKER" ]; then
            echo "::error::Cannot find integrated search background marker in index.html"
            exit 1
          fi
          EXPECTED_INDEX_SEARCH_ICON_MARKER="$(tr -d '\r' < index.html | grep -o 'f2c766' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_INDEX_SEARCH_ICON_MARKER" ]; then
            echo "::error::Cannot find integrated search icon marker in index.html"
            exit 1
          fi
          EXPECTED_LAW_PORTAL_TIP_MARKER="$(tr -d '\r' < law-precedent-search.html | grep -o '&lt;핵심키워드&gt;' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_LAW_PORTAL_TIP_MARKER" ]; then
            echo "::error::Cannot find law portal tip marker in law-precedent-search.html"
            exit 1
          fi
          EXPECTED_LAW_RESET_MARKER="$(tr -d '\r' < law-precedent-search.html | grep -o 'inputPrdKw.value = \"\";' | head -n 1 | tr -d '\r\n ')"
          if [ -z "$EXPECTED_LAW_RESET_MARKER" ]; then
            echo "::error::Cannot find law reset marker in law-precedent-search.html"
            exit 1
          fi
          EXPECTED_LAW_OLD_TEXT_MARKER="$(tr -d '\r' < law-precedent-search.html | grep -o '목록은 키워드 검색 결과입니다' | head -n 1 | tr -d '\r\n ')"
          if [ -n "$EXPECTED_LAW_OLD_TEXT_MARKER" ]; then
            echo "::error::Legacy law precedent disclaimer still exists in repository file"
            exit 1
          fi
          echo "css=$EXPECTED_CSS" >> "$GITHUB_OUTPUT"
          echo "emb_marker=$EXPECTED_EMB_MARKER" >> "$GITHUB_OUTPUT"
          echo "main_btn_marker=$EXPECTED_MAIN_BTN_MARKER" >> "$GITHUB_OUTPUT"
          echo "main_btn_fixed_marker=$EXPECTED_MAIN_BTN_FIXED_MARKER" >> "$GITHUB_OUTPUT"
          echo "integrated_placeholder_marker=$EXPECTED_INTEGRATED_PLACEHOLDER_MARKER" >> "$GITHUB_OUTPUT"
          echo "index_search_bg_marker=$EXPECTED_INDEX_SEARCH_BG_MARKER" >> "$GITHUB_OUTPUT"
          echo "index_search_icon_marker=$EXPECTED_INDEX_SEARCH_ICON_MARKER" >> "$GITHUB_OUTPUT"
          echo "law_portal_tip_marker=$EXPECTED_LAW_PORTAL_TIP_MARKER" >> "$GITHUB_OUTPUT"
          echo "law_reset_marker=$EXPECTED_LAW_RESET_MARKER" >> "$GITHUB_OUTPUT"
          echo "Expected CSS version: $EXPECTED_CSS"
          echo "Expected embassy marker: $EXPECTED_EMB_MARKER"
          echo "Expected main button marker: $EXPECTED_MAIN_BTN_MARKER"
          echo "Expected main button fixed marker: $EXPECTED_MAIN_BTN_FIXED_MARKER"
          echo "Expected integrated placeholder marker: $EXPECTED_INTEGRATED_PLACEHOLDER_MARKER"
          echo "Expected index search bg marker: $EXPECTED_INDEX_SEARCH_BG_MARKER"
          echo "Expected index search icon marker: $EXPECTED_INDEX_SEARCH_ICON_MARKER"
          echo "Expected law portal tip marker: $EXPECTED_LAW_PORTAL_TIP_MARKER"
          echo "Expected law reset marker: $EXPECTED_LAW_RESET_MARKER"

      - name: Deploy and verify live sync (auto-retry)
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          EXPECTED_CSS: ${{ steps.expected.outputs.css }}
          EXPECTED_EMB_MARKER: ${{ steps.expected.outputs.emb_marker }}
          EXPECTED_MAIN_BTN_MARKER: ${{ steps.expected.outputs.main_btn_marker }}
          EXPECTED_MAIN_BTN_FIXED_MARKER: ${{ steps.expected.outputs.main_btn_fixed_marker }}
          EXPECTED_INTEGRATED_PLACEHOLDER_MARKER: ${{ steps.expected.outputs.integrated_placeholder_marker }}
          EXPECTED_INDEX_SEARCH_BG_MARKER: ${{ steps.expected.outputs.index_search_bg_marker }}
          EXPECTED_INDEX_SEARCH_ICON_MARKER: ${{ steps.expected.outputs.index_search_icon_marker }}
          EXPECTED_LAW_PORTAL_TIP_MARKER: ${{ steps.expected.outputs.law_portal_tip_marker }}
          EXPECTED_LAW_RESET_MARKER: ${{ steps.expected.outputs.law_reset_marker }}
        run: |
          set -u
          HOOK_URL="$(printf '%s' "$DEPLOY_HOOK" | tr -d '\r\n ')"
          EXPECTED_CSS_NORM="$(printf '%s' "$EXPECTED_CSS" | tr -d '\r\n ')"
          EXPECTED_EMB_MARKER_NORM="$(printf '%s' "$EXPECTED_EMB_MARKER" | tr -d '\r\n ')"
          EXPECTED_MAIN_BTN_MARKER_NORM="$(printf '%s' "$EXPECTED_MAIN_BTN_MARKER" | tr -d '\r\n ')"
          EXPECTED_MAIN_BTN_FIXED_MARKER_NORM="$(printf '%s' "$EXPECTED_MAIN_BTN_FIXED_MARKER" | tr -d '\r\n ')"
          EXPECTED_INTEGRATED_PLACEHOLDER_MARKER_NORM="$(printf '%s' "$EXPECTED_INTEGRATED_PLACEHOLDER_MARKER" | tr -d '\r\n ')"
          EXPECTED_INDEX_SEARCH_BG_MARKER_NORM="$(printf '%s' "$EXPECTED_INDEX_SEARCH_BG_MARKER" | tr -d '\r\n ')"
          EXPECTED_INDEX_SEARCH_ICON_MARKER_NORM="$(printf '%s' "$EXPECTED_INDEX_SEARCH_ICON_MARKER" | tr -d '\r\n ')"
          EXPECTED_LAW_PORTAL_TIP_MARKER_NORM="$(printf '%s' "$EXPECTED_LAW_PORTAL_TIP_MARKER" | tr -d '\r\n ')"
          EXPECTED_LAW_RESET_MARKER_NORM="$(printf '%s' "$EXPECTED_LAW_RESET_MARKER" | tr -d '\r\n ')"

          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL is empty after trimming."
            exit 1
          fi

          LIVE_URL="https://www.daehanminkuk.co.kr/platform-faq.html"
          LIVE_URL_INTEGRATED="https://www.daehanminkuk.co.kr/integrated-search.html"
          LIVE_URL_INDEX="https://www.daehanminkuk.co.kr/index.html"
          LIVE_URL_LAW="https://www.daehanminkuk.co.kr/law-precedent-search.html"
          ATTEMPTS=8

          fetch_live_body() {
            local cb="$1"
            curl -sS -L \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$LIVE_URL?cb=${cb}-$(date +%s)"
          }

          parse_css_from_body() {
            printf '%s' "$1" | tr -d '\r' | sed -n 's/.*law-search-prd.css?v=\([0-9a-z]\+\).*/\1/p' | head -n 1 | tr -d '\r\n '
          }

          has_embassy_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q 'applyEmbassyDeepLinkFromUrl'
          }

          has_main_btn_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q 'class="main-home-btn"'
          }

          has_main_btn_fixed_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q 'position: fixed;'
          }

          has_integrated_placeholder_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q '표준코드, 관할출입국, 재외공관 등'
          }

          has_index_search_bg_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q '#2a3253'
          }

          has_index_search_icon_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q 'f2c766'
          }

          has_law_portal_tip_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q '&lt;핵심키워드&gt;'
          }

          has_law_reset_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q 'inputPrdKw.value = ""'
          }

          has_law_legacy_disclaimer_marker() {
            printf '%s' "$1" | tr -d '\r' | grep -q '목록은 키워드 검색 결과입니다'
          }

          debug_expected_live() {
            echo "::notice::DEBUG expected_css=$EXPECTED_CSS_NORM expected_emb_marker=$EXPECTED_EMB_MARKER_NORM live_css=$1 live_emb_marker=$2"
          }

          LIVE_PRE_BODY="$(fetch_live_body "pre-${GITHUB_RUN_ID}")"
          LIVE_PRE_CSS="$(parse_css_from_body "$LIVE_PRE_BODY")"
          LIVE_PRE_EMB_MARKER="missing"
          if has_embassy_marker "$LIVE_PRE_BODY"; then
            LIVE_PRE_EMB_MARKER="present"
          fi
          LIVE_PRE_INTEGRATED_BODY="$(curl -sS -L -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$LIVE_URL_INTEGRATED?cb=pre-${GITHUB_RUN_ID}-$(date +%s)")"
          LIVE_PRE_MAIN_BTN_MARKER="missing"
          if has_main_btn_marker "$LIVE_PRE_INTEGRATED_BODY"; then
            LIVE_PRE_MAIN_BTN_MARKER="present"
          fi
          LIVE_PRE_MAIN_BTN_FIXED_MARKER="missing"
          if has_main_btn_fixed_marker "$LIVE_PRE_INTEGRATED_BODY"; then
            LIVE_PRE_MAIN_BTN_FIXED_MARKER="present"
          fi
          LIVE_PRE_INTEGRATED_PLACEHOLDER_MARKER="missing"
          if has_integrated_placeholder_marker "$LIVE_PRE_INTEGRATED_BODY"; then
            LIVE_PRE_INTEGRATED_PLACEHOLDER_MARKER="present"
          fi
          LIVE_PRE_INDEX_BODY="$(curl -sS -L -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$LIVE_URL_INDEX?cb=pre-${GITHUB_RUN_ID}-$(date +%s)")"
          LIVE_PRE_INDEX_SEARCH_BG_MARKER="missing"
          if has_index_search_bg_marker "$LIVE_PRE_INDEX_BODY"; then
            LIVE_PRE_INDEX_SEARCH_BG_MARKER="present"
          fi
          LIVE_PRE_INDEX_SEARCH_ICON_MARKER="missing"
          if has_index_search_icon_marker "$LIVE_PRE_INDEX_BODY"; then
            LIVE_PRE_INDEX_SEARCH_ICON_MARKER="present"
          fi
          LIVE_PRE_LAW_BODY="$(curl -sS -L -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$LIVE_URL_LAW?cb=pre-${GITHUB_RUN_ID}-$(date +%s)")"
          LIVE_PRE_LAW_PORTAL_TIP_MARKER="missing"
          if has_law_portal_tip_marker "$LIVE_PRE_LAW_BODY"; then
            LIVE_PRE_LAW_PORTAL_TIP_MARKER="present"
          fi
          LIVE_PRE_LAW_OLD_TEXT_MARKER="missing"
          if has_law_legacy_disclaimer_marker "$LIVE_PRE_LAW_BODY"; then
            LIVE_PRE_LAW_OLD_TEXT_MARKER="present"
          fi
          LIVE_PRE_LAW_RESET_MARKER="missing"
          if has_law_reset_marker "$LIVE_PRE_LAW_BODY"; then
            LIVE_PRE_LAW_RESET_MARKER="present"
          fi
          echo "Precheck Expected CSS=$EXPECTED_CSS_NORM / Live CSS=$LIVE_PRE_CSS"
          echo "Precheck Expected emb-marker=$EXPECTED_EMB_MARKER_NORM / Live emb-marker=$LIVE_PRE_EMB_MARKER"
          echo "Precheck Expected main-btn-marker=$EXPECTED_MAIN_BTN_MARKER_NORM / Live main-btn-marker=$LIVE_PRE_MAIN_BTN_MARKER"
          echo "Precheck Expected main-btn-fixed=$EXPECTED_MAIN_BTN_FIXED_MARKER_NORM / Live main-btn-fixed=$LIVE_PRE_MAIN_BTN_FIXED_MARKER"
          echo "Precheck Expected integrated-placeholder=$EXPECTED_INTEGRATED_PLACEHOLDER_MARKER_NORM / Live integrated-placeholder=$LIVE_PRE_INTEGRATED_PLACEHOLDER_MARKER"
          echo "Precheck Expected index-search-bg=$EXPECTED_INDEX_SEARCH_BG_MARKER_NORM / Live index-search-bg=$LIVE_PRE_INDEX_SEARCH_BG_MARKER"
          echo "Precheck Expected index-search-icon=$EXPECTED_INDEX_SEARCH_ICON_MARKER_NORM / Live index-search-icon=$LIVE_PRE_INDEX_SEARCH_ICON_MARKER"
          echo "Precheck Expected law-portal-tip=$EXPECTED_LAW_PORTAL_TIP_MARKER_NORM / Live law-portal-tip=$LIVE_PRE_LAW_PORTAL_TIP_MARKER"
          echo "Precheck Expected law-reset=$EXPECTED_LAW_RESET_MARKER_NORM / Live law-reset=$LIVE_PRE_LAW_RESET_MARKER"
          echo "Precheck Expected law-old-text=missing / Live law-old-text=$LIVE_PRE_LAW_OLD_TEXT_MARKER"
          debug_expected_live "$LIVE_PRE_CSS" "$LIVE_PRE_EMB_MARKER"
          echo "Precheck matched 여부와 무관하게 최신 커밋 반영을 위해 deploy hook을 계속 진행합니다."

          for i in $(seq 1 $ATTEMPTS); do
            echo "== Attempt $i/$ATTEMPTS =="
            code="$(curl -sS -o /tmp/hook.body -w "%{http_code}" -X POST "$HOOK_URL")"
            echo "Deploy hook HTTP status: $code"
            echo "Deploy hook response (first 600 bytes):"
            head -c 600 /tmp/hook.body || true
            echo
            if command -v jq >/dev/null 2>&1; then
              if jq -e . /tmp/hook.body >/dev/null 2>&1; then
                echo "Deploy hook JSON (selected fields):"
                jq -c '{id, url, job: {id: .job.id, state: .job.state}}' /tmp/hook.body 2>/dev/null || true
              fi
            fi
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "::warning::Deploy hook returned non-success HTTP status."
            fi
            echo "Waiting for propagation..."
            sleep 60

            echo "Live HEAD (selected headers, cache-busting query):"
            curl -sS -D /tmp/live.head -o /dev/null \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$LIVE_URL?cb=head-${GITHUB_RUN_ID}-${i}-$(date +%s)" || true
            tr -d '\r' < /tmp/live.head | awk 'BEGIN{IGNORECASE=1} /^last-modified:|^age:|^etag:|^server:|^x-vercel-|^cache-control:/ {print}'

            LIVE_BODY="$(fetch_live_body "${GITHUB_RUN_ID}-${i}")"
            LIVE_CSS="$(parse_css_from_body "$LIVE_BODY")"
            LIVE_EMB_MARKER="missing"
            if has_embassy_marker "$LIVE_BODY"; then
              LIVE_EMB_MARKER="present"
            fi
            LIVE_INTEGRATED_BODY="$(curl -sS -L -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$LIVE_URL_INTEGRATED?cb=${GITHUB_RUN_ID}-${i}-$(date +%s)")"
            LIVE_MAIN_BTN_MARKER="missing"
            if has_main_btn_marker "$LIVE_INTEGRATED_BODY"; then
              LIVE_MAIN_BTN_MARKER="present"
            fi
            LIVE_MAIN_BTN_FIXED_MARKER="missing"
            if has_main_btn_fixed_marker "$LIVE_INTEGRATED_BODY"; then
              LIVE_MAIN_BTN_FIXED_MARKER="present"
            fi
            LIVE_INTEGRATED_PLACEHOLDER_MARKER="missing"
            if has_integrated_placeholder_marker "$LIVE_INTEGRATED_BODY"; then
              LIVE_INTEGRATED_PLACEHOLDER_MARKER="present"
            fi
            LIVE_INDEX_BODY="$(curl -sS -L -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$LIVE_URL_INDEX?cb=${GITHUB_RUN_ID}-${i}-$(date +%s)")"
            LIVE_INDEX_SEARCH_BG_MARKER="missing"
            if has_index_search_bg_marker "$LIVE_INDEX_BODY"; then
              LIVE_INDEX_SEARCH_BG_MARKER="present"
            fi
            LIVE_INDEX_SEARCH_ICON_MARKER="missing"
            if has_index_search_icon_marker "$LIVE_INDEX_BODY"; then
              LIVE_INDEX_SEARCH_ICON_MARKER="present"
            fi
            LIVE_LAW_BODY="$(curl -sS -L -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$LIVE_URL_LAW?cb=${GITHUB_RUN_ID}-${i}-$(date +%s)")"
            LIVE_LAW_PORTAL_TIP_MARKER="missing"
            if has_law_portal_tip_marker "$LIVE_LAW_BODY"; then
              LIVE_LAW_PORTAL_TIP_MARKER="present"
            fi
            LIVE_LAW_OLD_TEXT_MARKER="missing"
            if has_law_legacy_disclaimer_marker "$LIVE_LAW_BODY"; then
              LIVE_LAW_OLD_TEXT_MARKER="present"
            fi
            LIVE_LAW_RESET_MARKER="missing"
            if has_law_reset_marker "$LIVE_LAW_BODY"; then
              LIVE_LAW_RESET_MARKER="present"
            fi
            echo "Expected CSS=$EXPECTED_CSS_NORM / Live CSS=$LIVE_CSS"
            echo "Expected emb-marker=$EXPECTED_EMB_MARKER_NORM / Live emb-marker=$LIVE_EMB_MARKER"
            echo "Expected main-btn-marker=$EXPECTED_MAIN_BTN_MARKER_NORM / Live main-btn-marker=$LIVE_MAIN_BTN_MARKER"
            echo "Expected main-btn-fixed=$EXPECTED_MAIN_BTN_FIXED_MARKER_NORM / Live main-btn-fixed=$LIVE_MAIN_BTN_FIXED_MARKER"
            echo "Expected integrated-placeholder=$EXPECTED_INTEGRATED_PLACEHOLDER_MARKER_NORM / Live integrated-placeholder=$LIVE_INTEGRATED_PLACEHOLDER_MARKER"
            echo "Expected index-search-bg=$EXPECTED_INDEX_SEARCH_BG_MARKER_NORM / Live index-search-bg=$LIVE_INDEX_SEARCH_BG_MARKER"
            echo "Expected index-search-icon=$EXPECTED_INDEX_SEARCH_ICON_MARKER_NORM / Live index-search-icon=$LIVE_INDEX_SEARCH_ICON_MARKER"
            echo "Expected law-portal-tip=$EXPECTED_LAW_PORTAL_TIP_MARKER_NORM / Live law-portal-tip=$LIVE_LAW_PORTAL_TIP_MARKER"
            echo "Expected law-reset=$EXPECTED_LAW_RESET_MARKER_NORM / Live law-reset=$LIVE_LAW_RESET_MARKER"
            echo "Expected law-old-text=missing / Live law-old-text=$LIVE_LAW_OLD_TEXT_MARKER"
            debug_expected_live "$LIVE_CSS" "$LIVE_EMB_MARKER"

            if [ "$LIVE_CSS" = "$EXPECTED_CSS_NORM" ] && [ "$LIVE_EMB_MARKER" = "present" ] && [ "$LIVE_MAIN_BTN_MARKER" = "present" ] && [ "$LIVE_MAIN_BTN_FIXED_MARKER" = "present" ] && [ "$LIVE_INTEGRATED_PLACEHOLDER_MARKER" = "present" ] && [ "$LIVE_INDEX_SEARCH_BG_MARKER" = "present" ] && [ "$LIVE_INDEX_SEARCH_ICON_MARKER" = "present" ] && [ "$LIVE_LAW_PORTAL_TIP_MARKER" = "present" ] && [ "$LIVE_LAW_RESET_MARKER" = "present" ] && [ "$LIVE_LAW_OLD_TEXT_MARKER" = "missing" ]; then
              echo "Production is synced."
              exit 0
            fi

            if [ "$i" -lt "$ATTEMPTS" ]; then
              echo "Not synced yet. Retrying..."
              sleep 45
            fi
          done

          echo "::error::Production did not sync to expected HTML markers after $ATTEMPTS attempts."
          echo "::error::Expected CSS=$EXPECTED_CSS_NORM, Expected emb-marker=$EXPECTED_EMB_MARKER_NORM, Expected main-btn-marker=$EXPECTED_MAIN_BTN_MARKER_NORM, Expected main-btn-fixed=$EXPECTED_MAIN_BTN_FIXED_MARKER_NORM, Expected integrated-placeholder=$EXPECTED_INTEGRATED_PLACEHOLDER_MARKER_NORM, Expected index-search-bg=$EXPECTED_INDEX_SEARCH_BG_MARKER_NORM, Expected index-search-icon=$EXPECTED_INDEX_SEARCH_ICON_MARKER_NORM, Expected law-portal-tip=$EXPECTED_LAW_PORTAL_TIP_MARKER_NORM, Expected law-reset=$EXPECTED_LAW_RESET_MARKER_NORM, Expected law-old-text=missing"
          echo "::error::Next checks: Vercel Deploy Hook must belong to the SAME project that serves $LIVE_URL (Production), and Production Git branch must be main."
          exit 1
