<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>업무 게시</title>
  <style>
    :root {
      --ink: #12161c;
      --muted: #5a6270;
      --line: rgba(20, 24, 32, 0.12);
      --paper: #f8f6f2;
      --maroon: #5a3540;
      --maroon-dark: #3f242e;
      --max: 980px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(250, 249, 246, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: var(--max); margin: 0 auto; padding: 0.8rem 1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
    }
    .top-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .top-links a {
      text-decoration: none; color: var(--maroon-dark); font-weight: 700; font-size: 0.82rem;
      border: 1px solid rgba(90, 53, 64, 0.28); background: #fff; border-radius: 2px;
      padding: 0.35rem 0.6rem;
    }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 1.2rem 1rem 2rem; }
    .label { font-size: 0.72rem; color: var(--maroon); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }
    h1 { margin: 0.2rem 0 0.25rem; font-size: clamp(1.2rem, 2.7vw, 1.7rem); }
    .helper { margin: 0 0 0.9rem; color: var(--muted); font-size: 0.9rem; }
    .storage-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin: 0 0 0.75rem;
      padding: 0.32rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 0.79rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: #fff;
      color: var(--muted);
    }
    .storage-badge.cloud {
      color: #0d7a3f;
      border-color: rgba(13, 122, 63, 0.35);
      background: rgba(13, 122, 63, 0.09);
    }
    .storage-badge.local {
      color: #8b2c2c;
      border-color: rgba(139, 44, 44, 0.32);
      background: rgba(139, 44, 44, 0.08);
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      padding: 0.9rem;
      margin-bottom: 0.8rem;
    }
    .panel h2 { margin: 0 0 0.7rem; font-size: 1rem; }
    .row { display: flex; gap: 0.55rem; flex-wrap: wrap; align-items: center; }
    .status { min-height: 1.2rem; margin-top: 0.45rem; font-size: 0.83rem; color: var(--muted); }
    input[type="password"], input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 0.56rem 0.62rem;
      font: inherit;
    }
    textarea { min-height: 150px; resize: vertical; }
    .btn {
      border: 1px solid transparent; border-radius: 2px; cursor: pointer;
      padding: 0.48rem 0.86rem; font-size: 0.84rem; font-weight: 700;
    }
    .btn-primary { color: #fff; background: linear-gradient(180deg, var(--maroon) 0%, var(--maroon-dark) 100%); }
    .btn-ghost { background: #fff; color: var(--ink); border-color: var(--line); }
    .post-list { display: grid; gap: 0.7rem; }
    .file-help { margin-top: 0.45rem; font-size: 0.8rem; color: var(--muted); }
    .thumb-list {
      margin-top: 0.55rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.5rem;
    }
    .thumb-item {
      border: 1px solid var(--line);
      border-radius: 3px;
      overflow: hidden;
      background: #fff;
    }
    .thumb-item img {
      width: 100%;
      height: 95px;
      object-fit: cover;
      display: block;
      background: #f3f3f3;
    }
    .thumb-item button {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      background: #fafafa;
      padding: 0.32rem 0.4rem;
      font-size: 0.74rem;
      cursor: pointer;
    }
    .post-item {
      border: 1px solid var(--line); border-radius: 4px;
      background: linear-gradient(180deg, #ffffff 0%, #fdfcfa 100%);
      padding: 0.8rem 0.9rem;
    }
    .post-item h3 { margin: 0; font-size: 0.98rem; line-height: 1.4; }
    .meta { margin-top: 0.35rem; font-size: 0.79rem; color: var(--muted); }
    .body { margin-top: 0.55rem; white-space: pre-wrap; font-size: 0.9rem; }
    .post-images {
      margin-top: 0.6rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.55rem;
    }
    .post-images img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 3px;
      display: block;
      background: #f3f3f3;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--muted);
      padding: 0.85rem;
      font-size: 0.86rem;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <strong>업무 게시 페이지</strong>
      <div class="top-links">
        <a href="index.html">메인으로</a>
        <a href="resources.html">자료실</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <p class="label">Service Publishing</p>
    <h1 id="page-title">업무 게시</h1>
    <p class="helper" id="page-helper">해당 업무 전용 게시글을 작성하고 관리할 수 있습니다.</p>
    <p id="storage-badge" class="storage-badge">저장 방식 확인 중...</p>

    <section class="panel">
      <h2>관리자 인증</h2>
      <div class="row">
        <input id="admin-pass" type="password" placeholder="관리자 비밀번호" />
        <button id="btn-login" class="btn btn-primary" type="button">관리자 모드 켜기</button>
        <button id="btn-logout" class="btn btn-ghost" type="button">관리자 모드 끄기</button>
      </div>
      <p class="status" id="auth-status">현재: 일반 보기</p>
    </section>

    <section class="panel" id="editor-panel" style="display:none;">
      <h2>글 작성 / 수정 (관리자 전용)</h2>
      <form id="post-form" novalidate>
        <input id="post-id" type="hidden" />
        <input id="post-title" type="text" maxlength="120" placeholder="제목" required />
        <div style="height:0.55rem"></div>
        <textarea id="post-body" placeholder="내용을 입력하세요." required></textarea>
        <div style="height:0.55rem"></div>
        <input id="post-images-input" type="file" accept="image/*" multiple />
        <p class="file-help">이미지 첨부 또는 붙여넣기(Ctrl+V) 가능 · 최대 5장 · 각 1MB 이하</p>
        <div id="thumb-list" class="thumb-list"></div>
        <div class="row" style="margin-top:0.65rem;">
          <button class="btn btn-primary" type="submit">저장</button>
          <button class="btn btn-ghost" type="button" id="btn-reset">입력 초기화</button>
        </div>
      </form>
      <p class="status" id="form-status"></p>
    </section>

    <section class="panel">
      <h2>게시글 목록</h2>
      <div id="post-list" class="post-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      var SERVICE_MAP = {
        nonprofit: "비영리법인설립 업무",
        immigration: "출입국민원업무",
        investment: "기업투자·법인설립",
        patriot: "국가유공자보훈업무"
      };
      var ADMIN_PASS = "admin1234";
      var service = new URL(window.location.href).searchParams.get("service") || "nonprofit";
      if (!SERVICE_MAP[service]) service = "nonprofit";
      var STORAGE_KEY = "service-posts:" + service;

      var pageTitle = document.getElementById("page-title");
      var pageHelper = document.getElementById("page-helper");
      var adminPass = document.getElementById("admin-pass");
      var btnLogin = document.getElementById("btn-login");
      var btnLogout = document.getElementById("btn-logout");
      var authStatus = document.getElementById("auth-status");
      var editorPanel = document.getElementById("editor-panel");
      var postForm = document.getElementById("post-form");
      var postId = document.getElementById("post-id");
      var postTitle = document.getElementById("post-title");
      var postBody = document.getElementById("post-body");
      var postImagesInput = document.getElementById("post-images-input");
      var thumbList = document.getElementById("thumb-list");
      var btnReset = document.getElementById("btn-reset");
      var formStatus = document.getElementById("form-status");
      var postList = document.getElementById("post-list");
      var storageBadge = document.getElementById("storage-badge");

      var pendingImages = [];
      var currentPosts = [];
      var adminOn = false;
      var MAX_IMAGES = 5;
      var MAX_IMAGE_BYTES = 1024 * 1024;
      var client = null;
      var cloudEnabled = false;

      pageTitle.textContent = SERVICE_MAP[service] + " · 게시";
      pageHelper.textContent = SERVICE_MAP[service] + " 전용 게시글을 작성/수정/삭제할 수 있습니다.";

      if (window.supabase && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
        client = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        cloudEnabled = true;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizeUrl(text) {
        var url = String(text || "").trim();
        if (!/^https?:\/\//i.test(url)) return "";
        return url;
      }

      function parseImageUrlsFromHtml(html) {
        var doc = new DOMParser().parseFromString(html || "", "text/html");
        var nodes = Array.prototype.slice.call(doc.querySelectorAll("img"));
        return nodes.map(function (img) { return normalizeUrl(img.getAttribute("src")); }).filter(Boolean);
      }

      function loadLocalPosts() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveLocalPosts(items) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      }

      async function loadPosts() {
        if (cloudEnabled) {
          try {
            var res = await client
              .from("service_posts")
              .select("id, service, title, body, images, created_at")
              .eq("service", service)
              .order("created_at", { ascending: false });
            if (!res.error) return res.data || [];
          } catch (e) {}
        }
        return loadLocalPosts().sort(function (a, b) { return String(b.created_at || "").localeCompare(String(a.created_at || "")); });
      }

      function renderPosts() {
        var items = currentPosts;
        if (!items.length) {
          postList.innerHTML = '<p class="empty">등록된 게시글이 없습니다.</p>';
          return;
        }
        postList.innerHTML = items.map(function (item) {
          var imagesHtml = "";
          if (Array.isArray(item.images) && item.images.length) {
            imagesHtml = '<div class="post-images">' + item.images.map(function (img) {
              var src = img && img.data ? img.data : (img && img.url ? img.url : "");
              if (!src) return "";
              return '<img src="' + escapeHtml(src) + '" alt="' + escapeHtml((img && img.name) || "첨부 이미지") + '" />';
            }).join("") + "</div>";
          }
          var actions = adminOn
            ? '<div class="row" style="margin-top:0.55rem;">' +
              '<button class="btn btn-ghost" type="button" data-act="edit" data-id="' + item.id + '">수정</button>' +
              '<button class="btn btn-ghost" type="button" data-act="del" data-id="' + item.id + '">삭제</button>' +
              '</div>'
            : "";
          return '<article class="post-item">' +
            '<h3>' + escapeHtml(item.title) + '</h3>' +
            '<p class="meta">등록일: ' + escapeHtml(String(item.created_at || "").slice(0, 10)) + '</p>' +
            '<p class="body">' + escapeHtml(item.body) + '</p>' +
            imagesHtml + actions +
          '</article>';
        }).join("");
      }

      function resetForm() {
        postId.value = "";
        postForm.reset();
        pendingImages = [];
        renderThumbs();
      }

      function renderThumbs() {
        if (!pendingImages.length) {
          thumbList.innerHTML = "";
          return;
        }
        thumbList.innerHTML = pendingImages.map(function (img, index) {
          var src = img.data || img.url || "";
          var tag = img.url ? "URL" : "파일";
          return '<div class="thumb-item">' +
            '<img src="' + escapeHtml(src) + '" alt="' + escapeHtml(img.name || "이미지") + '" />' +
            '<button type="button" data-remove-image="' + index + '">' + tag + " 삭제</button>" +
          "</div>";
        }).join("");
      }

      function fileToDataURL(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () { resolve(String(reader.result || "")); };
          reader.onerror = function () { reject(new Error("read-failed")); };
          reader.readAsDataURL(file);
        });
      }

      async function appendImageFiles(files) {
        if (!files || !files.length) return;
        for (var i = 0; i < files.length; i++) {
          var file = files[i];
          if (!file || !/^image\//i.test(file.type)) continue;
          if (pendingImages.length >= MAX_IMAGES) {
            formStatus.textContent = "이미지는 최대 " + MAX_IMAGES + "장까지 첨부할 수 있습니다.";
            break;
          }
          if (file.size > MAX_IMAGE_BYTES) {
            formStatus.textContent = "이미지 '" + file.name + "' 용량이 1MB를 초과합니다.";
            continue;
          }
          try {
            var dataUrl = await fileToDataURL(file);
            pendingImages.push({ name: file.name || "image", data: dataUrl });
          } catch (e) {
            formStatus.textContent = "이미지 읽기에 실패했습니다.";
          }
        }
        renderThumbs();
      }

      function appendImageUrl(url) {
        if (pendingImages.length >= MAX_IMAGES) {
          formStatus.textContent = "이미지는 최대 " + MAX_IMAGES + "장까지 첨부할 수 있습니다.";
          return;
        }
        var safe = normalizeUrl(url);
        if (!safe) return;
        var exists = pendingImages.some(function (img) { return img.url === safe; });
        if (!exists) {
          pendingImages.push({ name: "외부 이미지", url: safe });
          renderThumbs();
        }
      }

      async function savePostCloud(id, title, body, images) {
        if (id) {
          return client.from("service_posts").update({ title: title, body: body, images: images }).eq("id", id);
        }
        return client.from("service_posts").insert({
          service: service,
          title: title,
          body: body,
          images: images
        });
      }

      function isMissingServicePostsTableError(err) {
        var msg = err && err.message ? String(err.message) : "";
        return /service_posts/i.test(msg) && /could not find the table|schema cache|does not exist/i.test(msg);
      }

      async function deletePostCloud(id) {
        return client.from("service_posts").delete().eq("id", id);
      }

      function updateAdminUi() {
        editorPanel.style.display = adminOn ? "block" : "none";
        var mode = adminOn ? "현재: 관리자 모드 켜짐" : "현재: 일반 보기";
        if (cloudEnabled) mode += " (공용 저장 사용)";
        else mode += " (로컬 저장만 사용)";
        authStatus.textContent = mode;
      }

      function updateStorageBadge() {
        storageBadge.classList.remove("cloud", "local");
        if (cloudEnabled) {
          storageBadge.classList.add("cloud");
          storageBadge.textContent = "저장 방식: 공용 저장 (Supabase) · 다른 PC에서도 동일하게 보임";
        } else {
          storageBadge.classList.add("local");
          storageBadge.textContent = "저장 방식: 로컬 저장 (현재 PC만) · 다른 PC와 동기화 안 됨";
        }
      }

      btnLogin.addEventListener("click", function () {
        if ((adminPass.value || "").trim() !== ADMIN_PASS) {
          authStatus.textContent = "비밀번호가 올바르지 않습니다.";
          return;
        }
        adminOn = true;
        adminPass.value = "";
        formStatus.textContent = "";
        updateAdminUi();
        renderPosts();
      });

      btnLogout.addEventListener("click", function () {
        adminOn = false;
        formStatus.textContent = "";
        updateAdminUi();
        renderPosts();
      });

      btnReset.addEventListener("click", function () {
        resetForm();
        formStatus.textContent = "";
      });

      postImagesInput.addEventListener("change", function () {
        appendImageFiles(postImagesInput.files);
        postImagesInput.value = "";
      });

      postBody.addEventListener("paste", function (e) {
        var clip = e.clipboardData;
        if (!clip) return;

        var files = [];
        var items = clip.items || [];
        for (var i = 0; i < items.length; i++) {
          var f = items[i].getAsFile ? items[i].getAsFile() : null;
          if (f && /^image\//i.test(f.type)) files.push(f);
        }
        if (files.length) {
          e.preventDefault();
          appendImageFiles(files);
          return;
        }

        var html = clip.getData("text/html");
        var urlsFromHtml = parseImageUrlsFromHtml(html);
        if (urlsFromHtml.length) {
          e.preventDefault();
          urlsFromHtml.forEach(appendImageUrl);
          return;
        }

        var text = clip.getData("text/plain");
        var maybeUrl = normalizeUrl(text);
        if (maybeUrl && /\.(png|jpe?g|gif|webp|bmp|svg)(\?.*)?$/i.test(maybeUrl)) {
          e.preventDefault();
          appendImageUrl(maybeUrl);
        }
      });

      thumbList.addEventListener("click", function (e) {
        var t = e.target;
        if (!t || !t.dataset || typeof t.dataset.removeImage === "undefined") return;
        var idx = Number(t.dataset.removeImage);
        if (Number.isNaN(idx)) return;
        pendingImages.splice(idx, 1);
        renderThumbs();
      });

      postForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        if (!adminOn) return;

        var title = (postTitle.value || "").trim();
        var body = (postBody.value || "").trim();
        if (!title || !body) {
          formStatus.textContent = "제목과 내용을 모두 입력해 주세요.";
          return;
        }

        var id = postId.value;
        if (cloudEnabled) {
          var res = await savePostCloud(id, title, body, pendingImages.slice());
          if (res.error) {
            if (isMissingServicePostsTableError(res.error)) {
              var fallbackItems = loadLocalPosts();
              if (id) {
                fallbackItems = fallbackItems.map(function (item) {
                  if (String(item.id) !== String(id)) return item;
                  item.title = title;
                  item.body = body;
                  item.images = pendingImages.slice();
                  return item;
                });
              } else {
                fallbackItems.push({
                  id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
                  service: service,
                  title: title,
                  body: body,
                  images: pendingImages.slice(),
                  created_at: new Date().toISOString()
                });
              }
              saveLocalPosts(fallbackItems);
              cloudEnabled = false;
              updateStorageBadge();
              updateAdminUi();
              formStatus.textContent = "Supabase 테이블이 없어 현재 PC 로컬 저장으로 전환했습니다. (테이블 생성 후 공용 저장 가능)";
            } else {
              formStatus.textContent = "저장 실패: " + res.error.message + " (service_posts 테이블 확인)";
              return;
            }
          }
        } else {
          var items = loadLocalPosts();
          if (id) {
            items = items.map(function (item) {
              if (String(item.id) !== String(id)) return item;
              item.title = title;
              item.body = body;
              item.images = pendingImages.slice();
              return item;
            });
          } else {
            items.push({
              id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
              service: service,
              title: title,
              body: body,
              images: pendingImages.slice(),
              created_at: new Date().toISOString()
            });
          }
          saveLocalPosts(items);
        }

        formStatus.textContent = id ? "게시글을 수정했습니다." : "게시글을 등록했습니다.";
        resetForm();
        currentPosts = await loadPosts();
        renderPosts();
      });

      postList.addEventListener("click", async function (e) {
        var btn = e.target && e.target.closest ? e.target.closest("button[data-act]") : null;
        if (!btn || !adminOn) return;
        var act = btn.dataset.act;
        var id = btn.dataset.id;
        if (!act || !id) return;

        var one = currentPosts.find(function (item) { return String(item.id) === String(id); });
        if (!one) return;

        if (act === "edit") {
          postId.value = one.id;
          postTitle.value = one.title || "";
          postBody.value = one.body || "";
          pendingImages = Array.isArray(one.images) ? one.images.slice() : [];
          renderThumbs();
          formStatus.textContent = "수정 모드입니다.";
          postTitle.focus();
          editorPanel.scrollIntoView({ behavior: "smooth", block: "start" });
          return;
        }

        if (act === "del") {
          if (!confirm("이 게시글을 삭제하시겠습니까?")) return;
          if (cloudEnabled) {
            var delRes = await deletePostCloud(id);
            if (delRes.error) {
              formStatus.textContent = "삭제 실패: " + delRes.error.message;
              return;
            }
          } else {
            var local = loadLocalPosts().filter(function (item) { return String(item.id) !== String(id); });
            saveLocalPosts(local);
          }
          formStatus.textContent = "게시글을 삭제했습니다.";
          if (String(postId.value) === String(id)) resetForm();
          currentPosts = await loadPosts();
          renderPosts();
        }
      });

      updateAdminUi();
      updateStorageBadge();
      currentPosts = await loadPosts();
      renderPosts();
    })();
  </script>
